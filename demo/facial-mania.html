<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C0809">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Facial Mania &mdash; AI Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0C0809;--surface:#140D10;--surface-2:#1B1014;--surface-3:#241519;
  --border:rgba(255,18,101,0.14);--border-dim:rgba(245,238,240,0.06);
  --pink:#FF1265;--pink-light:#FFB9D2;--pink-glow:rgba(255,18,101,0.15);
  --gold:#C9A76B;--green:#1DB87E;--amber:#F5B942;--blue:#4E9EFF;--red:#E03E3E;
  --text:#F5EEF0;--text-2:#C4B0B8;--text-muted:#8A7580;--text-dim:#4A363E;
  --radius:10px;--radius-lg:14px;
  --font-d:"Playfair Display",Georgia,serif;
  --font-b:"Barlow",sans-serif;
  --font-l:"Barlow Condensed",sans-serif;
  --font-m:"JetBrains Mono",monospace;
  --tr:0.2s ease;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.5;overflow-x:hidden;-webkit-text-size-adjust:100%}
button,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.view{display:none}
.view.active{display:block;animation:fadeIn 0.2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes cardIn{to{opacity:1;transform:none}}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(29,184,126,0.4)}50%{box-shadow:0 0 0 4px rgba(29,184,126,0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
@keyframes popIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:none}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
/* HDR */
.hdr{position:sticky;top:0;z-index:200;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 16px;height:64px;background:rgba(12,8,9,0.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border-dim)}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
