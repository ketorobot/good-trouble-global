<style>
:root{
  --orange:#FF5500; --orange-d:#CC4400; --black:#080808;
  --ink:#F2EFEA; --dim:#9a948c; --card:#111013; --line:#232025;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--black);color:var(--ink);font-family:'Barlow',sans-serif;overflow:hidden}

header{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 10px;
  background:linear-gradient(to bottom, rgba(8,8,8,.96) 60%, rgba(8,8,8,0));
  pointer-events:none;
}
.brandrow{display:flex;align-items:baseline;justify-content:space-between;pointer-events:auto}
.brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.06em;color:var(--ink)}
.brand span{color:var(--orange)}
.count{font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums}
.chips{display:flex;gap:8px;overflow-x:auto;padding:10px 2px 14px;scrollbar-width:none;pointer-events:auto}
.chips::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;
  padding:7px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--card);color:var(--dim);cursor:pointer;white-space:nowrap;
  transition:all .15s ease;
}
.chip.active{background:var(--orange);border-color:var(--orange);color:#080808}

#feed{
  height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;
  scrollbar-width:none;
}
#feed::-webkit-scrollbar{display:none}
.slide{
  height:100dvh;scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:110px 24px 90px;
}
.cat-tag{
  font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.18em;
  color:var(--orange);margin-bottom:18px;text-transform:uppercase;
}
.fact{
  font-size:clamp(22px, 5.5vw, 34px);line-height:1.45;font-weight:500;
  max-width:640px;text-align:center;text-wrap:balance;
}
.meta{
  margin-top:26px;font-size:12px;color:var(--dim);letter-spacing:.08em;
  font-variant-numeric:tabular-nums;
}
.hint{
  position:fixed;bottom:calc(env(safe-area-inset-bottom) + 18px);left:0;right:0;
  text-align:center;font-size:12px;color:var(--dim);letter-spacing:.14em;
  text-transform:uppercase;animation:pulse 2.2s ease-in-out infinite;pointer-events:none;
  z-index:9;
}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.85}}
.reshuffle{
  border:1px dashed var(--orange-d);border-radius:14px;padding:22px 26px;
  color:var(--orange);font-weight:600;font-size:16px;text-align:center;max-width:520px;
}
.reshuffle small{display:block;margin-top:8px;color:var(--dim);font-weight:400}
</style>

const DATA = {"Universe":["The observable universe is approximately 93 billion light-years in diameter.","The universe is estimated to be 13.8 billion years old.","There are an estimated 2 trillion galaxies in the observable universe.","The Milky Way galaxy contains between 200 and 400 billion stars.","Our solar system is located about 26,000 light-years from the center of the Milky Way.","The nearest star to our Sun is Proxima Centauri — 4.24 light-years away.","Light travels at 186,282 miles per second (299,792 km/s).","A light-year is approximately 5.88 trillion miles (9.46 trillion km).","The Andromeda Galaxy is the nearest large galaxy — about 2.537 million light-years away.","The Andromeda Galaxy and Milky Way are on a collision course — expected to merge in about 4.5 billion years.","The Big Bang is not an explosion in space — it was the rapid expansion of space itself.","The four fundamental forces are gravity, electromagnetism, the strong nuclear force, and the weak nuclear force.","Dark matter makes up approximately 27% of the universe's total energy-matter content.","Dark energy makes up approximately 68% of the universe.","Only about 5% of the universe is ordinary visible matter.","The universe's expansion is accelerating — discovered in 1998, earning the 2011 Nobel Prize in Physics.","The cosmic microwave background (CMB) is the afterglow of the Big Bang — a uniform 2.7 K background radiation.","The CMB was discovered accidentally in 1965 by Penzias and Wilson at Bell Labs.","Black holes form when massive stars collapse at the end of their lives.","The event horizon of a black hole is the point of no return — nothing, not even light, can escape.","Sagittarius A* — the supermassive black hole at the center of the Milky Way — is 4 million solar masses.","The first direct image of a black hole (M87*) was captured in 2019 by the Event Horizon Telescope.","M87* is 6.5 billion times the mass of the Sun.","Stephen Hawking proposed that black holes emit radiation (Hawking radiation) and eventually evaporate.","Neutron stars are the densest known objects — a teaspoon of neutron star material weighs about a billion tons.","Neutron stars can spin hundreds of times per second (pulsars).","Kilonovae (neutron star mergers) produce gold, platinum, and other heavy elements.","The atoms in your body were formed inside stars that lived and died before our Sun formed.","Carl Sagan's famous phrase: 'We are made of star stuff.'","Stars are powered by nuclear fusion — hydrogen fusing into helium in their cores.","The Sun converts about 600 million tons of hydrogen into helium every second.","The Sun is in its main sequence phase — expected to last 5 more billion years.","When the Sun dies, it will expand into a red giant, then shrink to a white dwarf.","A supernova briefly outshines an entire galaxy of 200 billion stars.","The Big Bang produced only hydrogen, helium, and trace lithium — all heavier elements were forged in stars.","Gold requires conditions found only in the most violent cosmic events — neutron star mergers.","There are approximately 10^24 stars in the observable universe — more than grains of sand on all Earth's beaches.","The Sun accounts for 99.86% of the total mass of our solar system.","Jupiter is larger than all other planets combined.","A day on Venus (243 Earth days) is longer than a year on Venus (225 Earth days).","Venus rotates retrograde — east to west, opposite to most planets.","The surface temperature on Venus (~465°C) is hotter than Mercury despite being farther from the Sun.","Mars has the largest volcano in the solar system — Olympus Mons, three times the height of Everest.","Valles Marineris on Mars is as wide as the US and deeper than the Grand Canyon.","Jupiter's Great Red Spot is a storm that has lasted at least 400 years — wider than Earth.","Saturn's rings are made mostly of ice and rock — remarkably thin but up to 282,000 km wide.","Titan (Saturn's moon) has rivers, lakes, and rain of liquid methane.","Enceladus (Saturn's moon) shoots water ice geysers into space — indicating a subsurface ocean.","Europa (Jupiter's moon) has a liquid water ocean beneath its ice crust — a top target for life search.","Pluto was reclassified as a dwarf planet in 2006 by the International Astronomical Union.","Voyager 1 is the farthest human-made object — over 23 billion km from Earth.","Voyager 1 entered interstellar space in August 2012.","The James Webb Space Telescope can see galaxies as they existed 100 million years after the Big Bang.","Over 5,500 exoplanets have been confirmed as of 2024.","The TRAPPIST-1 system has 7 Earth-sized planets — three potentially in the habitable zone.","The Drake Equation estimates the number of communicating civilizations — key parameters remain uncertain.","The Fermi Paradox asks: if the universe is so vast and old, where is everybody?","The 'Wow! Signal' (1977) was a strong narrowband radio signal of unknown origin — never repeated.","The Moon is slowly receding from Earth at about 3.8 cm per year.","Total solar eclipses are possible because the Sun and Moon appear the same size from Earth.","The Sun is 400 times larger than the Moon but also 400 times farther away.","Earth is the only known planet with plate tectonics — which may be essential for long-term habitability.","The Earth's magnetic field protects life from solar wind.","Gravitational waves ripple through spacetime at the speed of light.","LIGO first detected gravitational waves in September 2015 from two merging black holes.","Quantum entanglement allows instantaneous correlation between particles regardless of distance.","Einstein called quantum entanglement 'spooky action at a distance.'","The Higgs boson, discovered at CERN in 2012, gives mass to other particles.","GPS satellites require corrections for both special and general relativistic time dilation.","The universe's geometry is flat to within 0.4% measurement precision.","The observable universe is only the region from which light has had time to reach us.","After about 100 trillion years, the last star will burn out.","The multiverse hypothesis proposes that our universe is one of potentially infinite parallel universes.","Cosmic inflation explains why the universe looks the same in all directions.","Pulsar timing arrays detected a gravitational wave background in 2023.","The Carrington Event (1859) was the most powerful solar storm on record.","Organic molecules including amino acids have been found in meteorites.","Water ice has been detected on the Moon, Mercury, and many solar system bodies.","Mars had liquid water on its surface more than 3 billion years ago.","Life on Earth began at least 3.5 billion years ago based on microfossil evidence.","The Parker Solar Probe has gotten within 3.8 million miles of the Sun.","The structure of the universe at large scales is a 'cosmic web' of filaments, walls, voids, and clusters.","The most distant observed galaxy (as of 2024) is approximately 33 billion light-years away.","The Oort Cloud is a vast spherical shell extending about 100,000 AU — the source of long-period comets.","The Kuiper Belt extends from Neptune's orbit to about 50 AU.","New Horizons photographed Pluto in 2015, revealing the heart-shaped Tombaugh Regio.","Io (Jupiter's moon) is the most volcanically active body in the solar system.","Ganymede (Jupiter's moon) is the largest moon in the solar system — larger than Mercury.","Neptune's winds are the fastest in the solar system — up to 2,100 km/h.","Uranus rotates on its side at a 98° axial tilt — likely from an ancient massive collision.","The word 'galaxy' comes from the Greek word for milk — galaxias.","The Milky Way is a barred spiral galaxy with 4 major spiral arms.","Our solar system takes approximately 225-250 million years to orbit the Milky Way — one galactic year.","The last time Earth was in its current galactic position, dinosaurs had just appeared.","The largest known black hole (TON 618) has a mass of 66 billion solar masses.","If you fell into a black hole, tidal forces would 'spaghettify' you before reaching the singularity.","Time runs slower in stronger gravitational fields — confirmed by GPS satellites daily.","White dwarfs are the remnant cores of dead Sun-like stars — roughly Earth's size but the Sun's mass.","About half of all stars are in binary or multiple-star systems.","Edwin Hubble used Cepheid variables to prove Andromeda was a separate galaxy in 1924.","The Hubble tension — disagreement on the expansion rate — is an ongoing crisis in cosmology.","The Big Rip is a possible fate of the universe if dark energy accelerates indefinitely.","The Big Freeze is the most likely fate: the universe expands forever and heat death occurs.","Brown dwarfs are 'failed stars' — too massive to be planets but too small to fuse hydrogen.","The first exoplanet around a Sun-like star (51 Pegasi b) was confirmed in 1995.","Rogue planets drift through space without a parent star — they may outnumber stars in the galaxy.","The coldest natural place in the universe is the Boomerang Nebula — -272°C.","The Sun's corona is mysteriously hotter than the surface — 1 million°C vs 5,500°C.","Solar wind streams from the Sun at 400-800 km/s continuously.","Auroras are caused by solar wind particles interacting with Earth's magnetic field.","The solar cycle is approximately 11 years — alternating solar minimum and maximum.","The asteroid belt between Mars and Jupiter is mostly empty space despite millions of asteroids.","Halley's Comet is visible from Earth every 75-76 years — next in 2061.","The tail of a comet always points away from the Sun due to solar wind.","Io has over 400 active volcanoes — heated by tidal flexing from Jupiter's gravity.","Europa's subsurface ocean is estimated to be twice the volume of Earth's oceans.","Saturn's moon Mimas looks remarkably like the Death Star from Star Wars.","Uranus was the first planet discovered with a telescope — by William Herschel in 1781.","Neptune was the first planet predicted mathematically before it was observed.","Pioneer 10 and 11 carry gold plaques with information about humanity.","Voyager 1 and 2 carry golden records with sounds and images of Earth.","The Hubble Space Telescope has made over 1.5 million observations since 1990.","The James Webb Space Telescope operates at -233°C to detect infrared light.","The most distant quasar observed existed when the universe was only 670 million years old.","Quasars are powered by accreting supermassive black holes — among the most luminous objects known.","The largest known structure in the universe is the Hercules-Corona Borealis Great Wall.","The Planck length (10^-35 m) is the smallest meaningful unit of space according to quantum gravity theories.","The universe's first stars (Population III) formed from pure hydrogen and helium — they were enormous.","Globular clusters can be 12 billion years old — nearly as old as the universe.","WIMPs (Weakly Interacting Massive Particles) are the leading dark matter candidate.","Gravitational lensing was the first confirmation of Einstein's general relativity in 1919.","The largest known star (UY Scuti) is about 1,700 times the radius of the Sun.","The Orion Nebula is one of the most studied star-forming regions — visible to the naked eye.","The Eagle Nebula's 'Pillars of Creation' are dense columns of gas and dust where new stars form.","The Crab Nebula is the remnant of a supernova observed in 1054 CE by Chinese astronomers.","Fast Radio Bursts (FRBs) are millisecond-duration intense radio pulses of unknown origin.","The highest-energy cosmic rays have energies exceeding 10^20 eV — the 'Oh-My-God particle.'","Breakthrough Listen is the largest and most comprehensive SETI program — funded by Yuri Milner.","The Moon was likely formed when a Mars-sized protoplanet collided with early Earth 4.5 billion years ago.","Tidal locking means the Moon always shows the same face to Earth.","The Apollo 11 Moon landing on July 20, 1969, was humanity's greatest engineering achievement.","Water ice in permanently shadowed lunar craters was confirmed by NASA's LCROSS mission in 2009.","India's Chandrayaan-3 became the first mission to land near the lunar south pole in 2023.","China's Chang'e 6 mission (2024) returned samples from the Moon's far side for the first time.","The Artemis program aims to return humans to the Moon and put the first woman on the surface.","Mars has seasons because its axial tilt is 25° — similar to Earth's 23.5°.","A Martian day (sol) is 24 hours and 37 minutes.","Ingenuity helicopter on Mars performed the first powered flight on another planet in April 2021.","The largest volcano in the solar system, Olympus Mons, is 13 miles high.","Europa Clipper (NASA) launched in 2024 to study Europa's habitability potential.","The Cassini spacecraft orbited Saturn for 13 years before its 2017 suicide dive.","Titan's atmosphere is denser than Earth's — surface pressure is 1.5 times Earth's.","The Dragonfly mission (NASA) will send a rotorcraft to Titan in the 2030s.","TESS has identified thousands of exoplanet candidates.","The nearest exoplanet, Proxima b, orbits in the habitable zone of Proxima Centauri.","Interstellar space has about 1 atom per cubic centimeter — not a true vacuum.","The Milky Way's central supermassive black hole (Sgr A*) was directly imaged in 2022 by the EHT.","Radio astronomy opened a window on the universe invisible to optical telescopes.","The Chandra X-ray Observatory has been revealing the hot, violent universe since 1999.","The Planck satellite mapped the CMB with exquisite precision — constraining cosmological parameters.","Freeman Dyson proposed a 'Dyson sphere' — a megastructure that captures all of a star's energy.","The Kardashev scale rates civilizations by energy use — Type I (planet), II (star), III (galaxy).","Humans are approximately Type 0.73 on the Kardashev scale.","The simulation hypothesis (Nick Bostrom) argues the probability we are in a simulation is significant.","The Fermi Paradox has over 30 proposed solutions.","The Arecibo Message was a 1974 broadcast toward globular cluster M13 — 25,000 light-years away.","LIGO detectors measure distances to one-thousandth the size of a proton.","String theory proposes that fundamental particles are one-dimensional vibrating strings.","The double-slit experiment is one of the most puzzling demonstrations of quantum behavior.","Schrödinger's cat thought experiment illustrates quantum superposition at macroscopic scale.","Heisenberg Uncertainty Principle: the more precisely you know a particle's position, the less precisely you can know its momentum.","Quantum tunneling allows particles to pass through energy barriers — enabling nuclear fusion in the Sun.","Special relativity (Einstein, 1905): the speed of light is constant for all observers.","Mass-energy equivalence: E = mc² — a tiny amount of mass equals an enormous amount of energy.","General relativity (Einstein, 1915) describes gravity as curvature of spacetime.","The Standard Model describes electromagnetic, strong, and weak forces via quantum field theories.","Magnetars are neutron stars with magnetic fields a trillion times stronger than Earth's.","Binary star systems are more common than single stars like our Sun.","Variable stars are used as 'standard candles' to measure cosmic distances.","Super-Earths are rocky planets larger than Earth but smaller than Neptune — very common in the galaxy.","Mercury has no atmosphere and experiences temperature extremes from -180°C to 430°C.","If the Sun were hollow, approximately 1.3 million Earths could fit inside.","The Sun's core temperature is approximately 15 million°C.","Phobos orbits so close to Mars that tidal forces will eventually pull it apart in ~50 million years.","Pluto has 5 known moons — the largest, Charon, is half Pluto's size.","There may be a 'Planet Nine' — a large undiscovered planet in the outer solar system.","Voyager 2 is the only spacecraft to have visited both Uranus and Neptune.","The holographic principle suggests the universe may be encoded on a 2D surface.","The universe contains vast cosmic voids — regions nearly empty of galaxies.","Baryon acoustic oscillations are sound waves from the early universe frozen into large-scale structure.","The fine structure constant (alpha ≈ 1/137) governs electromagnetic interactions.","Titan's methane cycle mirrors Earth's water cycle.","Jupiter's magnetosphere is so large it would appear larger than a full Moon if visible to naked eye.","Cosmic rays are high-energy particles that constantly bombard Earth from space.","Solar flares can disrupt GPS, radio communications, and power grids.","A Coronal Mass Ejection (CME) is a massive burst of plasma from the Sun's corona.","Earth's axial tilt of 23.5° is responsible for Earth's seasons.","Without the Moon's gravitational stabilization, Earth's axial tilt could vary dramatically.","Tidal forces from the Moon slow Earth's rotation — days are getting longer by ~1.4 ms per century.","Earth is approximately 4.54 billion years old.","The first life on Earth was single-celled organisms — for most of Earth's history, life was microscopic.","Complex multicellular life appeared only about 600 million years ago.","The Milky Way and Andromeda galaxies are both members of the Local Group — about 54 galaxies.","The Local Group spans about 10 million light-years.","The Virgo Supercluster contains the Local Group and spans about 110 million light-years.","Light from the Sun takes 8 minutes and 20 seconds to reach Earth.","Light from the nearest star (Proxima Centauri) takes 4.24 years to reach Earth.","The universe has no center — every point in space sees all others receding from it.","The CMB temperature is 2.725 K — just above absolute zero.","The first 380,000 years after the Big Bang, the universe was opaque to light.","The Dark Ages of the universe (380,000 to ~180 million years) had no stars or light sources.","The first stars ignited around 180 million years after the Big Bang.","There are an estimated 700 quintillion (7×10^20) planets in the observable universe.","Kepler Space Telescope discovered more than 2,600 confirmed exoplanets during its mission.","HD 189733b is a gas giant where it rains glass horizontally at 5,400 mph.","WASP-12b is being slowly consumed by its host star.","Some exoplanets orbit two stars simultaneously — called circumbinary planets.","Proxima Centauri is a red dwarf — it will live about 4 trillion years (300x longer than the Sun).","Red dwarfs make up about 75% of all stars in the galaxy.","A neutron star's surface gravity is about 200 billion times Earth's.","Magnetar flares release more energy in 0.1 seconds than the Sun emits in 100,000 years.","The GW170817 neutron star merger was the first multi-messenger astronomical event.","Observations of GW170817 confirmed that neutron star mergers produce heavy elements like gold.","Type Ia supernovae are 'standard candles' — used to measure cosmic distances and discover dark energy.","The information paradox asks: what happens to information that falls into a black hole?","Einstein rings form when a massive object perfectly aligns between a distant light source and Earth.","The Hubble Deep Field (1995) revealed thousands of galaxies in a patch of sky the size of a grain of sand.","James Webb captured galaxy JADES-GS-z14-0 — existing just 290 million years after the Big Bang.","Astronauts on the ISS experience 16 sunrises and sunsets every 24 hours.","The ISS travels at 17,500 mph — circling Earth every 90 minutes.","The ISS is the most expensive object ever built — approximately $150 billion.","About 600 humans have been to space — as of 2024.","Ion propulsion uses electric fields to accelerate ions — far more efficient than chemical rockets.","Solar sails use radiation pressure from sunlight for propulsion.","The Breakthrough Starshot initiative plans to send nanocraft at 20% of light speed to Alpha Centauri.","Gamma-ray bursts (GRBs) are the most luminous events in the universe.","A GRB lasting 0.1 seconds releases as much energy as the Sun will emit over its entire 10-billion-year life.","Type Ia supernova discovery of dark energy (1998) was the most surprising discovery in cosmology.","Hawking radiation has a temperature inversely proportional to black hole mass.","Black holes have no hair — fully described by just mass, charge, and spin (no-hair theorem).","The Sagittarius Dwarf Galaxy is currently being absorbed by the Milky Way.","Dark matter halos surround all galaxies — much larger than the visible galaxy.","This galaxy rotation problem was identified by Vera Rubin in the 1970s.","Vera Rubin's work on galaxy rotation is considered one of the most important discoveries of the 20th century.","The observable universe contains more planets than grains of sand on all of Earth's beaches.","Interstellar molecules include complex organics — ethanol, formic acid, and amino acid precursors have been detected.","The first stars (Population III) had no metals — they were made entirely of hydrogen and helium.","Stellar metallicity increases over cosmic time as successive stellar generations enrich the interstellar medium.","A teaspoon of white dwarf material weighs about 15 tons.","White dwarfs cool over trillions of years — eventually becoming 'black dwarfs' (none yet exist — universe too young).","Quasar jets can extend for millions of light-years.","Radio galaxies produce the largest known physical structures in the universe.","Blazars are quasars with relativistic jets aimed directly at Earth.","The cosmic web contains more volume in voids than in filaments or clusters.","Galaxy clusters are the largest gravitationally bound structures in the universe.","The Bullet Cluster provided the strongest direct evidence for dark matter — from collision of two clusters.","In the Bullet Cluster, hot gas slowed during collision while dark matter passed through unimpeded.","The Big Bang nucleosynthesis lasted only the first 3 minutes of cosmic history.","All elements heavier than hydrogen and helium were forged in stellar interiors or violent cosmic events.","The cosmic neutrino background exists but has never been directly detected.","For every billion photons in the universe, there is roughly one proton.","Some neutron stars spin so rapidly (millisecond pulsars) that they complete 700 rotations per second.","Gravitational wave astronomy is a completely new observational window on the universe — opened in 2015.","The LISA space-based gravitational wave detector is planned for launch in the 2030s.","Pulsar timing arrays use millisecond pulsars as a galaxy-scale gravitational wave detector.","The stochastic gravitational wave background detected in 2023 is believed to come from supermassive black hole binaries.","The Pierre Auger Observatory detects ultra-high-energy cosmic rays using 3,000 km² of detectors.","Neutrino telescopes (IceCube) detect high-energy neutrinos from cosmic accelerators.","The IceCube detector uses 1 km³ of Antarctic ice as a neutrino detector.","Multi-messenger astronomy combines gravitational waves, electromagnetic radiation, and neutrinos.","The Schwarzschild radius defines the event horizon size for a non-rotating black hole.","Black holes do not 'suck' — they attract via gravity just like any other mass.","Stellar black holes form from stars above about 20 solar masses.","Intermediate-mass black holes (100-100,000 solar masses) are observed but rare.","Primordial black holes (formed in the early universe) are a dark matter candidate.","Hawking radiation would take ~10^67 years for a stellar-mass black hole to evaporate.","The cosmic microwave background is polarized — patterns encode information about inflation.","Gravitational lensing can create multiple images of the same distant quasar.","Einstein cross: a single quasar appears as 4 images around a foreground galaxy.","The Hubble constant (H₀) measures the current expansion rate — approximately 70 km/s/Mpc.","Measurement of H₀ from CMB and from supernovae disagree by ~9% — the Hubble tension.","Cosmic inflation was proposed by Alan Guth in 1980 to explain the horizon and flatness problems.","Inflation implies the universe expanded faster than light for a fraction of a second.","Eternal inflation produces 'pocket universes' with potentially different physical constants.","The anthropic principle: we observe a universe compatible with our existence because we exist to observe it.","Frank Drake's first SETI radio search (Project Ozma) in 1960 targeted two nearby Sun-like stars.","Biosignatures (oxygen, methane, ozone) in exoplanet atmospheres could indicate life.","Technosignatures (radio signals, Dyson spheres) are signs of technology.","KIC 8462852 ('Tabby's Star') showed unusual dimming — alien megastructure was proposed, dust clouds more likely.","The first confirmed interstellar object was 'Oumuamua (2017) — cigar-shaped and accelerating anomalously.","Borisov (2019) was the first confirmed interstellar comet.","The Hulse-Taylor binary pulsar was the first indirect evidence for gravitational waves — Nobel Prize 1993.","General relativity passes every precision test — with some tension at cosmological scales.","Dark matter simulations produce the correct large-scale structure of the universe.","WIMPs have been searched for decades without direct detection — pushing theorists toward other candidates.","Axions are ultra-light dark matter candidates that also solve a problem in particle physics.","Dark energy behaves like a cosmological constant (Λ) — Einstein's 'greatest blunder' turned out to be right.","A cosmological constant represents vacuum energy — the energy of empty space.","The coincidence problem: why are dark energy and matter densities similar today if they evolve differently?","DESI (Dark Energy Spectroscopic Instrument) is mapping 40 million galaxies to study dark energy.","The Rubin Observatory LSST will image the entire visible sky every few nights.","Nancy Grace Roman Space Telescope will conduct the widest deep-sky survey from space.","The HR (Hertzsprung-Russell) diagram is the fundamental tool of stellar astronomy.","The Chandrasekhar limit separates white dwarfs from neutron stars by final fate of the progenitor.","Only about 1% of a supernova's energy is in light — 99% is in neutrinos.","Neutrinos from Supernova 1987A arrived 3 hours before the visible light — confirming theory.","SN 1987A in the Large Magellanic Cloud was the first naked-eye supernova since 1604.","Hypernovae (extremely energetic supernovae) are associated with long gamma-ray bursts.","Pair-instability supernovae completely obliterate massive stars — leaving no remnant.","The direct-collapse black hole hypothesis proposes some seeds formed from direct collapse of gas clouds.","The missing satellites problem: simulations predict more dwarf galaxies than observed.","The Large Magellanic Cloud is expected to collide with the Milky Way in ~2.4 billion years.","Planetary systems are common — over 50% of Sun-like stars likely have Earth-sized planets.","Planet formation begins within 1-3 million years of a star's formation.","Rocky planets form in the inner disk; gas giants form in the outer disk.","Grand Tack hypothesis explains Jupiter's current orbit via inward then outward migration.","Jupiter's migration may have sculpted the asteroid belt and seeded Earth with water.","Earth's water may have been delivered by asteroids and comets from the outer solar system.","Space is not a complete vacuum; it contains an average of just a few hydrogen atoms per cubic meter in intergalactic space.","The largest known impact crater in the solar system is the Utopia Planitia on Mars, with an estimated diameter of 2,050 miles.","Because of gravitational time dilation, Earth's core is actually about 2.5 years younger than its surface.","Venus is the only planet in our solar system that does not have a magnetic field generated by an internal dynamo.","The Milky Way is moving through the universe at a speed of approximately 1.3 million miles per hour (2.1 million km/h).","Neptune’s moon Triton is the only large moon in the solar system that orbits in the opposite direction of its planet’s rotation.","Cosmic dust is not like household dust; it is made up of microscopic solid particles of carbon, silicates, and metals ejected by stars.","The closest planetary system to Earth with multiple confirmed planets is Gliese 876, located about 15 light-years away.","Uranus has 13 known rings, which are extremely dark and composed of relatively large particles up to several meters wide.","The Sun’s light takes about 5.5 hours to reach Pluto, compared to only 8.3 minutes to reach Earth.","If two pieces of the same type of metal touch in space, they will permanently bond together in a process called cold welding.","Venus has more volcanoes than any other planet in our solar system, with over 1,600 major volcanic structures mapped.","The universe's average temperature today is 2.7 Kelvin, but during the Big Bang, it was infinitely hot.","Jupiter has a \"fuzzy\" or dilute core made of rock, ice, and metallic hydrogen that spreads out across nearly half of the planet's radius.","The solar system takes up only a tiny fraction of the Oort Cloud, which represents the outer boundary of the Sun's gravitational dominance.","Astronomers have discovered a giant cloud of alcohol in space, known as Sagittarius B2, which contains billions of liters of ethanol.","The first photograph of the Sun was taken in 1845 by French physicists Louis Fizeau and Léon Foucault.","Mercury is actually shrinking; as its iron core cools, the planet's crust contracts, creating massive cliffs called lobate scarps.","The Milky Way has a massive halo of hot gas surrounding it that contains as much mass as all the stars in the galaxy combined.","Saturn's moon Iapetus is famous for its two-toned coloration, with one side as dark as coal and the other as bright as snow.","The Bootes Void is one of the largest known cosmic voids in the universe, stretching 330 million light-years across with very few galaxies.","High-velocity stars are stars moving fast enough to eventually escape the gravitational pull of the Milky Way entirely.","On Uranus and Neptune, the extreme atmospheric pressure is believed to compress carbon into actual diamond rain.","The closest black hole to Earth currently known is Gaia BH1, located just 1,560 light-years away in the constellation Ophiuchus.","Jupiter's moon Ganymede is the only moon in the solar system known to possess its own internally generated magnetic field.","The coldest place in our solar system is actually inside permanently shadowed craters near the Moon's poles, reaching -247°C.","The cosmic calendar scales the 13.8 billion-year history of the universe down to a single year; on this scale, humans appear on December 31st at 11:52 PM.","Hypervelocity stars are launched out of the galactic center at millions of miles per hour by interactions with supermassive black holes.","Solar sails use the physical pressure of sunlight, rather than solar wind, to propel spacecraft through space without fuel.","The rings of Saturn are not solid; they are composed of billions of individual water ice particles ranging in size from dust to mountains.","Light from the center of the Sun can take up to 100,000 years to escape to its surface due to constant scattering by dense plasma.","The \"Pillars of Creation\" are so massive that the distance from the top to the bottom of the leftmost pillar is about 4 light-years.","Venus is completely covered by thick clouds of sulfuric acid, which reflect 75% of the sunlight that hits them.","The Great Attractor is a gravitational anomaly in intergalactic space that is pulling the Milky Way and thousands of other galaxies toward it.","Because space is silent, NASA uses \"sonification\" to translate astronomical data from telescopes into audible sound waves.","The planet Mercury is actually the closest orbital neighbor to Earth on average, despite Venus coming closer at its absolute nearest point.","A \"blazar\" is a highly compact quasar with its powerful jet of relativistic particles pointed directly toward Earth.","Mars has two tiny moons, Phobos and Deimos, which are believed to be captured main-belt asteroids.","The Sun rotates faster at its equator (about 25 days) than at its poles (about 35 days) because it is a ball of plasma, not a solid.","The asteroid Psyche 16 is made almost entirely of exposed iron and nickel, believed to be the partial core of a shattered protoplanet.","Gravitational redshifting occurs when light loses energy and shifts to longer wavelengths as it tries to escape a strong gravitational field.","A single day on Jupiter lasts only about 9 hours and 56 minutes, making it the fastest-spinning planet in the solar system.","The Local Group of galaxies is slowly being pulled toward the Virgo Cluster, a massive concentration of over 1,000 galaxies.","Liquid water cannot exist on the surface of Mars today because the atmospheric pressure is too low, causing water to instantly boil and freeze.","The Sloan Great Wall was once the largest known structure in the universe, stretching 1.37 billion light-years in length.","Black dwarfs are theoretical objects that will form when white dwarfs cool down completely and stop emitting light, taking quadrillions of years.","Saturn’s density is so low that if you could find a bathtub large enough to hold it, the planet would float on water.","The celestial equator is the projection of the terrestrial equator into the three-dimensional celestial sphere of the sky.","Stellar-mass black holes are typically 3 to dozens of times the mass of our Sun and are created when massive stars go supernova.","Spacecraft must use gravity assists, or \"slingshot\" maneuvers around planets, to gain enough speed to reach the outer solar system.","The cosmic \"Jeans instability\" is the physical threshold where a giant cloud of gas begins to collapse under its own gravity to form stars.","The heliosphere is the vast, bubble-like region of space inflated by the solar wind that shields the solar system from cosmic rays.","White holes are theoretical mathematical solutions to general relativity that behave as the exact time-reversal of black holes.","The core of a red giant star is composed of helium, which eventually undergoes a sudden \"helium flash\" to begin fusing into carbon.","If you could drive a car upward at 60 mph (97 km/h), you would reach outer space in just over an hour.","The Moon is not a perfect sphere; it is slightly egg-shaped, with the large end pointing directly toward Earth due to tidal forces.","Uranus's rings were discovered entirely by accident in 1977 when astronomers watched the planet pass in front of a distant star.","The Lagrange points are five positions in space where the gravitational forces of two large bodies create stable orbital zones.","Interstellar comets, like 2I/Borisov, are comets that originated in other star systems and are passing through ours on hyperbolic orbits.","The Sun’s magnetic field reverses its polarity completely every 11 years during the peak of the solar cycle.","Cosmic string is a hypothetical one-dimensional topological defect that may have formed during the early symmetry-breaking phases of the universe.","Jupiter’s moon Callisto is the most heavily cratered object in the solar system, with a surface that has remained unchanged for 4 billion years.","The solar system resides in the Local Bubble, a cavity of low-density, high-temperature gas carved out by nearby supernovae millions of years ago.","Dark matter was first proposed in the 1930s by Fritz Zwicky, who noticed galaxies in the Coma Cluster were moving far too fast to stay bound.","The surface of Venus is so hostile that the longest any human-made lander has survived on it is just over two hours.","Solar flares release massive amounts of magnetic energy, equivalent to millions of 100-megaton hydrogen bombs exploding at once.","Supernovae are classified into Type I and Type II based on whether or not their optical spectrum shows lines of hydrogen.","The Moon's gravity is only one-sixth of Earth's, meaning an object that weighs 150 pounds on Earth would weigh only 25 pounds on the Moon.","The first exoplanet ever discovered orbiting a main-sequence star was 51 Pegasi b, which is a \"Hot Jupiter\" orbiting its star in just 4 days.","Saturn's moon Rhea has a very thin atmosphere composed of oxygen and carbon dioxide, sustained by chemical reactions on its icy surface.","The \"Great Filter\" is a hypothetical developmental barrier that prevents civilizations from expanding into interstellar space.","The largest known canyon on Mars, Valles Marineris, was formed by tectonic cracking of the planet's crust, not by water erosion.","Red dwarf stars are so efficient at fusing hydrogen that they can remain stable main-sequence stars for trillions of years.","The Hubble Space Telescope does not use a color camera; it takes monochrome images through filters, which are later color-coded by scientists.","Microgravity on the International Space Station causes astronauts to lose up to 1% of their bone density for every month spent in space.","The asteroid belt contains millions of rocky bodies, but its total mass is only about 3% of the mass of Earth's Moon.","Binary black holes generate gravitational waves that carry away orbital energy, forcing them to spiral closer together and eventually merge.","The Orion Arm is the minor spiral arm of the Milky Way galaxy where our solar system is located.","Spacecraft use radioisotope thermoelectric generators (RTGs) fueled by decaying plutonium-238 to power instruments when solar power is unviable.","If the Sun were replaced with a black hole of the exact same mass, Earth would not get sucked in; it would continue orbiting normally.","The cosmic expansion of space stretches the wavelength of traveling light, shifting it toward the red end of the spectrum over time.","The Moon has \"moonquakes\" that can last up to 30 minutes, triggered by tidal forces from Earth's gravity.","The zodiacal light is a faint, triangular glow seen in the night sky caused by sunlight scattering off dust particles in the flat plane of the solar system.","Venus has a retrograde rotation so slow that its core rotates faster than its solid crust.","Proxima Centauri c is a super-Earth exoplanet orbiting our nearest stellar neighbor, located further out than its sister planet Proxima b.","Globular clusters are spherical collections of up to millions of ancient stars, tightly bound together by gravity in a galaxy's halo.","The Cosmic Infrared Background is a diffuse infrared glow from dust warmed by the first generation of stars and active galactic nuclei.","The escape velocity required to leave Earth’s gravitational pull completely is approximately 25,000 miles per hour (11.2 km/s).","In space, liquid water instantly boils due to the lack of atmospheric pressure, then the vapor immediately desublimates into tiny ice crystals.","The Pioneer Anomaly was a tiny, unexplained deceleration of the Pioneer 10 and 11 spacecraft, later proven to be caused by thermal recoil forces.","The celestial coordinate system uses declination (similar to latitude) and right ascension (similar to longitude) to map objects in the sky.","Because Uranus is tilted at 98 degrees, one pole experiences 42 years of continuous sunlight followed by 42 years of continuous darkness.","Stellar winds from massive O-type stars are so powerful they can blow away several solar masses of material over the star's lifetime.","The rings of Neptune are composed of five distinct bands that are clumpy, forming dense sections called \"ring arcs.\"","Solar radiation pressure can gradually alter the orbits of small asteroids over time, a phenomenon known as the Yarkovsky effect.","The barycenter is the physical center of mass around which two or more orbiting bodies revolve, such as the Sun and Jupiter.","Jupiter’s gravity is so strong that it acts as a cosmic shield for Earth, deflecting or capturing many incoming comets and asteroids.","The most abundant element in the universe is hydrogen, followed by helium, which together make up roughly 98% of all visible matter.","The Kuiper Belt was named after astronomer Gerard Kuiper, who proposed its existence in 1951 to explain short-period comets.","The CMB radiation is incredibly uniform, with temperature fluctuations of only about one part in 100,000 across the entire sky."],"Food & Health":["The universe is approximately 13.8 billion years old — measured from the Big Bang.","The Big Bang was not an explosion into space — it was the expansion of space itself.","The Milky Way contains 100-400 billion stars.","The nearest star to Earth (other than the Sun) is Proxima Centauri — 4.24 light-years away.","Light from Proxima Centauri takes 4.24 years to reach Earth.","The Sun is a G-type main-sequence star — a yellow dwarf.","The Sun accounts for 99.86% of the total mass of the Solar System.","The Sun converts 4 million tons of mass into energy every second.","The Sun is approximately 4.6 billion years old and has about 5 billion years left.","The Sun's surface (photosphere) is approximately 5,500°C.","The solar corona exceeds 1 million°C — why it's hotter than the surface is still an open question.","Light from the Sun takes about 8 minutes and 20 seconds to reach Earth.","The Sun's energy takes approximately 100,000 years to travel from the core to the surface.","Sunspots are temporary cooler regions caused by magnetic field disruptions.","The solar cycle (sunspot activity) has an approximately 11-year period.","Solar flares can knock out power grids and satellites — a major civilization risk.","The Carrington Event of 1859 was the largest recorded geomagnetic storm — telegraph wires burst into flame.","Dark matter makes up approximately 27% of the universe's total energy-mass content.","Dark energy makes up approximately 68% of the universe's total energy-mass content.","Ordinary (baryonic) matter — everything we can see — makes up only about 5% of the universe.","Dark matter does not emit, absorb, or reflect light — it is only detected by its gravitational effects.","The nature of dark matter is one of the biggest unsolved problems in physics.","Dark energy is responsible for the accelerating expansion of the universe.","The universe's expansion is accelerating — discovered in 1998 by studying distant supernovae.","This discovery won the 2011 Nobel Prize in Physics (Perlmutter, Schmidt, Riess).","The Hubble constant describes the rate of universe expansion — currently ~70 km/s/Mpc.","There is a 'Hubble tension' — different measurement methods give slightly different values.","Black holes form when massive stars collapse under their own gravity.","The event horizon of a black hole is the point of no return.","Hawking radiation predicts that black holes slowly evaporate over astronomical timescales.","Hawking radiation has never been directly detected — it is too weak to measure.","The first image of a black hole was captured in 2019 (M87*) by the Event Horizon Telescope.","Sagittarius A* is the supermassive black hole at the center of the Milky Way — 4 million solar masses.","The first image of Sagittarius A* was published in 2022.","Supermassive black holes exist at the center of nearly every large galaxy.","Stellar black holes typically range from 3 to 100 solar masses.","Neutron stars are the densest objects known — a teaspoon would weigh 10 million tons.","Neutron stars are the remnants of massive star supernovae — typically 10-25 solar masses pre-explosion.","Pulsars are rapidly rotating neutron stars — emitting beams of radio waves.","Magnetars have the strongest magnetic fields in the known universe.","A magnetar flare in 2004 briefly outshone all stars in the Milky Way — detected from 50,000 light-years.","White dwarfs are the remnants of stars like our Sun — slowly cooling over billions of years.","A white dwarf the size of Earth contains the mass of the Sun.","Type Ia supernovae are used as standard candles to measure cosmic distances.","Supernovae produce most of the heavy elements heavier than iron.","The gold in your jewelry was forged in neutron star mergers.","Gravitational waves were first detected on September 14, 2015 by LIGO.","The detected merger created a black hole of approximately 62 solar masses.","The first gravitational wave event was from two black holes 1.3 billion light-years away.","Gravitational waves travel at the speed of light.","The speed of light in a vacuum is exactly 299,792,458 meters per second.","Nothing with mass can reach the speed of light — it would require infinite energy.","Time dilation means time passes more slowly at high velocities and in strong gravity.","GPS satellites must correct for both special and general relativistic time dilation.","Einstein's E=mc² expresses the equivalence of mass and energy.","The energy equivalent of 1 gram of mass is approximately 90 terajoules — the yield of a nuclear bomb.","Cosmic inflation expanded the universe by a factor of at least 10^26 in 10^-36 seconds.","The cosmic microwave background (CMB) is the afterglow of the Big Bang — detectable as microwave radiation.","The CMB was discovered accidentally in 1965 by Penzias and Wilson.","The CMB has a nearly perfect blackbody spectrum at 2.725 K.","Tiny fluctuations in the CMB seeded all structure in the universe — galaxies, clusters, voids.","The James Webb Space Telescope (JWST) can observe galaxies from 100-200 million years after the Big Bang.","JWST discovered galaxies more massive than expected at high redshift — challenging existing models.","The Andromeda Galaxy (M31) is the nearest large galaxy — 2.5 million light-years away.","The Milky Way and Andromeda will merge in approximately 4.5 billion years.","The Local Group contains 30+ galaxies — dominated by the Milky Way and Andromeda.","The Virgo Supercluster contains 100+ galaxy groups and clusters.","The Laniakea Supercluster (our supercluster) spans 520 million light-years.","The cosmic web consists of filaments, sheets, and voids — the large-scale structure of the universe.","Cosmic voids can span hundreds of millions of light-years — mostly empty space.","The Great Attractor is a gravitational anomaly pulling the Milky Way at 600 km/s.","The universe has no center — every point looks the same from every direction.","Quasars are the most luminous persistent objects in the universe.","The most distant quasar observed is from when the universe was less than 700 million years old.","Fast Radio Bursts (FRBs) are millisecond-long radio pulses from extragalactic sources — still not fully explained.","Gamma-ray bursts are the most energetic explosions in the universe — releasing more energy than the Sun in its lifetime.","Long GRBs (>2 seconds) are associated with the death of massive stars.","Short GRBs (<2 seconds) are associated with neutron star mergers.","The observable universe contains an estimated 10^24 stars.","The universe's large-scale structure was mapped by the Sloan Digital Sky Survey.","Euclid Space Telescope (2023) is mapping billions of galaxies to study dark energy.","The Roman Space Telescope will image 1 billion galaxies.","The Vera C. Rubin Observatory will catalog 37 billion objects in 10 years.","Parallax is used to measure distances to nearby stars — the parsec unit comes from this method.","One parsec equals 3.26 light-years.","Cepheid variable stars are used to measure distances across millions of light-years.","Edwin Hubble used Cepheids to prove that galaxies exist outside the Milky Way — 1923.","Hubble also discovered that the universe is expanding — 1929.","The multiverse hypothesis proposes infinite universes — most remain untestable.","Eternal inflation generates infinitely many bubble universes with potentially different physical constants.","The anthropic principle notes that the universe's constants are tuned for life — because we're here to observe.","Fine-tuning of physical constants (gravity, electromagnetism) appears essential for complex structures.","The Drake Equation estimates the number of technological civilizations in the galaxy.","Fermi paradox: if intelligent life is common, why haven't we detected any?","The Great Silence (no alien contact) has many proposed explanations — the Great Filter being most discussed.","SETI (Search for Extraterrestrial Intelligence) has been searching for radio signals since 1960.","The Wow! Signal (1977) remains the best candidate for an extraterrestrial radio transmission.","Exoplanet detection has revealed billions of rocky planets in the habitable zones of their stars.","The Kepler Space Telescope discovered over 2,600 confirmed exoplanets.","TESS (Transiting Exoplanet Survey Satellite) is discovering exoplanets around nearby bright stars.","Trappist-1 system has 7 Earth-sized planets — at least 3 in the habitable zone.","Biosignatures (oxygen, methane, ozone) in an exoplanet's atmosphere could indicate life.","JWST is capable of analyzing exoplanet atmospheres during transits.","The habitable zone ('Goldilocks zone') is where liquid water could exist on a planet's surface.","Life on Earth has been found in hydrothermal vents, Antarctic ice, and radioactive mine water — extending the definition of habitable.","Panspermia proposes that life spreads between planets via asteroids and comets.","The Moon's distance is increasing by 3.8 cm per year due to tidal friction.","Eventually the Earth's rotation will slow until the day equals the lunar month.","Earth's tides are caused primarily by the Moon's gravity — the Sun contributes approximately 46%.","Tidal forces from Jupiter are the primary driver of Io's volcanic activity.","Europa's subsurface ocean is maintained by tidal heating from Jupiter.","The asteroid belt between Mars and Jupiter contains millions of objects but very little total mass.","Ceres is the largest object in the asteroid belt — a dwarf planet.","The Kuiper Belt extends from 30 to 50 AU — containing Pluto, Eris, and thousands of objects.","The Oort Cloud is a hypothetical spherical shell at 2,000-100,000 AU — source of long-period comets.","Halley's Comet has been observed for at least 2,000 years and returns every ~75 years.","Comets are 'dirty snowballs' — mixtures of ice, dust, and rock.","The coma and tail of a comet only form when it approaches the Sun.","A comet's tail always points away from the Sun — blown by solar wind.","Jupiter's gravity acts as a gravitational shield — deflecting comets that would otherwise hit Earth.","The universe has no edge — it is finite but unbounded, like the surface of a sphere.","Time itself began with the Big Bang — there was no 'before.'","The Planck epoch (first 10^-43 seconds) is the earliest moment physics can describe.","Grand Unified Theories (GUTs) attempt to merge the three non-gravitational forces.","Supersymmetry (SUSY) predicts a partner particle for every known particle — none found yet.","String theory requires 10 or 11 dimensions — the extra ones are compactified at tiny scales.","M-theory unifies the five versions of string theory into a single framework.","The ekpyrotic model proposes the Big Bang was a collision between two membranes (branes).","Cyclic cosmology proposes the universe undergoes endless cycles of expansion and contraction.","The arrow of time is not explained by fundamental physics — all equations are time-reversible.","The second law of thermodynamics is the only physical law that distinguishes past from future.","Parity violation was discovered in 1956 — the weak force distinguishes left from right.","CP violation explains (partly) why there is more matter than antimatter in the universe.","Baryogenesis (the creation of excess matter) remains an unsolved problem in cosmology.","The flatness problem: why is the universe's geometry so precisely flat?","Inflation solves the flatness, horizon, and monopole problems simultaneously.","Primordial gravitational waves from inflation would leave a B-mode polarization signal in the CMB.","BICEP experiments are searching for this B-mode signal.","The cosmic lithium problem: the Big Bang produced more lithium-7 than observed — unexplained.","Stellar populations (I, II, III) trace the chemical enrichment history of the universe.","The most metal-rich stars are Population I — like our Sun.","The oldest globular clusters are Population II — they contain nearly no heavy elements.","Magnesium, silicon, and oxygen are the most abundant elements after hydrogen and helium.","The oxygen in your body was forged in stars approximately 4-8 times the mass of the Sun.","The iron in your blood was produced in Type Ia supernovae.","The calcium in your bones came from supernovae ejecta billions of years ago.","Radio bursts from magnetars may explain some Fast Radio Bursts.","FRBs are being detected at a rate of ~1,000 per day across the sky.","CHIME telescope in Canada has detected the majority of known FRBs.","Repeating FRBs suggest the source is not destroyed by the burst.","The first repeating FRB (FRB 121102) was localized to a dwarf galaxy 3 billion light-years away.","Active Galactic Nuclei (AGN) are powered by supermassive black hole accretion.","Seyfert galaxies, blazars, and quasars are all types of AGN — differing in orientation and luminosity.","The unified model of AGN explains different types as the same object viewed from different angles.","Black hole feedback (AGN jets) regulates star formation in host galaxies.","The most luminous quasar (J0529-4351) is 500 trillion times brighter than the Sun.","Gravitational redshift stretches light from massive objects — clocks run slower in gravity wells.","Gravitational time dilation was confirmed with atomic clocks at different altitudes.","Frame dragging (Lense-Thirring effect): a spinning mass drags spacetime with it.","Gravity Probe B confirmed frame dragging around Earth in 2011.","Shapiro delay: light passing near a mass takes longer than in flat spacetime.","The equivalence principle: free fall is indistinguishable from being in empty space.","Einstein derived general relativity from the equivalence principle and special relativity.","Geodesic paths in curved spacetime are the paths objects naturally follow under gravity.","Neutron star mergers produce r-process elements — including gold, platinum, and uranium.","The r-process requires extreme neutron flux — found in mergers and core-collapse supernovae.","Most gold on Earth was delivered by asteroid impacts after planetary formation.","Platinum-group elements are rare in the crust because they sank to Earth's core during formation.","The cosmic abundance of elements peaks at iron-56 — the most tightly bound nucleus.","Fusion beyond iron requires energy input — hence it only occurs in violent events.","Oxygen-burning, neon-burning, and silicon-burning occur in the last days of a massive star's life.","Onion-shell structure of a pre-supernova star: H, He, C, Ne, O, Si, Fe layers.","A massive star's iron core collapses in less than a second when fusion stops.","The bounce-shock mechanism of core-collapse supernovae is still not fully understood.","Neutrinos carry 99% of a supernova's energy — more than light and kinetic energy combined.","Pulsars were initially thought by some scientists to be signals from extraterrestrial intelligence.","Jocelyn Bell Burnell discovered the first pulsar in 1967 — her supervisors won the Nobel Prize.","The first binary pulsar (PSR 1913+16) enabled indirect detection of gravitational waves.","Radio pulsars slow down measurably over time — their period increases with age.","The Crab Pulsar spins 30 times per second — still powered by the 1054 CE supernova.","White dwarf crystallization has been observed — dead stars turning into cosmic diamonds.","Brown dwarfs lack the mass to sustain hydrogen fusion but may fuse deuterium briefly.","Y-class brown dwarfs have surface temperatures below 500 K — cooler than a kitchen oven.","T Tauri stars are young stellar objects still contracting before hydrogen fusion begins.","Protoplanetary disks around young stars are the birthplace of planets.","Gaps in protoplanetary disks are often carved by forming planets.","ALMA telescope has imaged protoplanetary disks with stunning ring structures.","The Solar System formed from a rotating molecular cloud 4.6 billion years ago.","Jupiter and Saturn formed first — within the first 10 million years.","Rocky planets took ~100 million years to assemble through accretion.","The Late Heavy Bombardment (~3.9 billion years ago) scarred the Moon and inner planets.","Earth's Moon is unusually large relative to its host planet.","The Moon's gravitational influence stabilizes Earth's axial tilt within a narrow range.","Earth's unusually large iron core gives it a strong magnetic field — protecting the atmosphere.","Mars lost its magnetic field ~4 billion years ago — its atmosphere was subsequently stripped.","Venus's dense CO₂ atmosphere creates a runaway greenhouse — surface pressure 90x Earth's.","Titan is the only moon with a dense atmosphere — and the only world with surface liquid besides Earth.","Enceladus's geysers feed Saturn's E ring.","Europa's ice shell is estimated 10-30 km thick — a liquid ocean may be twice Earth's total water.","Ganymede has its own magnetic field — the only moon with one.","Callisto is the most heavily cratered object in the solar system.","Jupiter's magnetosphere is the largest structure in the solar system after the Sun's heliosphere.","The heliosphere extends to the heliopause — approximately 120 AU from the Sun.","Beyond the heliopause is interstellar space — where the Sun's solar wind can no longer be detected.","Cosmic rays below a certain energy level are deflected by the heliosphere.","Dark matter filaments connect galaxy clusters — forming the cosmic web.","Galaxy groups contain 2-50 galaxies; clusters contain hundreds to thousands.","Intracluster medium (hot gas in clusters) emits X-rays — detectable by space telescopes.","Baryonic acoustic oscillations imprinted in galaxy clustering are a cosmological 'standard ruler.'","Power spectrum of galaxy clustering constrains dark matter, dark energy, and neutrino masses.","Weak gravitational lensing distorts background galaxy shapes — used to map dark matter.","The Cosmic Horseshoe is a nearly perfect Einstein ring formed by gravitational lensing.","The Hubble Space Telescope's Hubble Deep Field contained ~3,000 galaxies in a speck of sky.","Webb's deep field images showed galaxies from just 300-500 million years after the Big Bang.","The most distant galaxy (JADES-GS-z14-0) has a redshift of z=14.32.","Redshift z=1100 corresponds to the surface of last scattering — when the CMB was emitted.","The Square Kilometre Array (SKA) will map the 21-cm signal across cosmic time.","Gravitational wave detectors (LIGO, Virgo, KAGRA) are improving sensitivity with each upgrade.","LIGO's A+ upgrade will increase detectable volume by ~8x.","A 3rd-generation detector (Einstein Telescope, Cosmic Explorer) will detect mergers across the visible universe.","Apples float in water because they are 25% air.","Bananas are technically berries, but strawberries are not.","Avocados are also botanically classified as berries.","Cashews grow outside the cashew apple fruit — they are not true nuts.","Peanuts are legumes, not true nuts.","Honey never spoils — archaeologists have found 3,000-year-old honey in Egyptian tombs still edible.","A single bee produces about 1/12 teaspoon of honey in its lifetime.","Real vanilla comes from orchids native to Mexico — each flower must be hand-pollinated.","It takes approximately 400 cacao beans to make one pound of chocolate.","Dark chocolate (70%+ cacao) contains flavonoids that may benefit cardiovascular health.","Coffee is the second most traded commodity in the world after petroleum.","Caffeine blocks adenosine receptors in the brain, preventing drowsiness signals.","The half-life of caffeine in the body is approximately 5-6 hours.","Decaf coffee still contains about 2-12 mg of caffeine per 8 oz cup.","All true teas come from the same plant: Camellia sinensis.","Green tea contains L-theanine, which promotes calm alertness synergistically with caffeine.","The gut microbiome is directly affected by dietary choices within 24 hours.","The standard American diet averages only 10-15g of fiber per day vs. the recommended 25-38g.","Eating foods in order (vegetables → protein/fat → carbohydrates) reduces post-meal blood sugar by 30-40%.","Vinegar consumed before a meal reduces the glycemic response to the meal.","Piperine in black pepper increases curcumin (turmeric) absorption by 2,000%.","The brain is about 60% fat — primarily DHA (omega-3).","The FDA banned artificial trans fats from the US food supply in 2018.","The Mediterranean diet has the strongest evidence for cardiovascular health and longevity.","Extra virgin olive oil contains oleocanthal, which has ibuprofen-like anti-inflammatory properties.","Processed meat (bacon, hot dogs) is classified as a Group 1 carcinogen by the WHO.","Broccoli contains sulforaphane, which activates cancer-fighting detoxification enzymes.","Allicin in garlic is only activated when crushed or chopped and rested for 10 minutes.","Blueberries have the highest antioxidant content of common fruits.","Lycopene in tomatoes is more bioavailable in cooked tomatoes than raw.","Magnesium deficiency affects an estimated 50-70% of Americans.","Iron deficiency is the most common nutrient deficiency globally, affecting about 2 billion people.","Vitamin B12 is found almost exclusively in animal products — vegans must supplement.","Vitamin D deficiency affects about 1 billion people globally.","Ultra-processed foods are independently associated with higher mortality.","The Sugar Research Foundation paid Harvard researchers in the 1960s to downplay sugar's role in heart disease.","The human gut contains approximately 5 pounds of bacteria by weight.","Short-chain fatty acids produced by gut bacteria from fiber are anti-inflammatory.","Fecal microbiota transplants have an 80-90% cure rate for recurrent C. difficile infections.","Protein promotes satiety more effectively than carbohydrates or fat.","High protein intake (1.6-2.2g/kg body weight) is optimal for muscle retention during weight loss.","Muscle loss (sarcopenia) accelerates after age 30 — resistance training is the most effective intervention.","Creatine monohydrate is the most extensively researched sports supplement with the strongest evidence.","Creatine improves cognitive performance and may slow neurodegeneration.","The Okinawan traditional diet is high in sweet potatoes, vegetables, soy, and fish.","Dan Buettner's 'Blue Zones' identified five regions with unusually high longevity.","Loneliness increases mortality risk by approximately 26% — comparable to smoking 15 cigarettes per day.","Exercise is the single most powerful evidence-based intervention for cognitive health.","150 minutes of moderate exercise per week reduces risk of heart disease, cancer, diabetes, and depression.","VO2 max is the best single predictor of longevity.","Sitting for more than 8 hours per day is an independent cardiovascular risk factor.","Walking for 10-15 minutes after meals reduces post-meal blood glucose by 20-30%.","7-9 hours of sleep is optimal for most adults; under 6 hours is linked to disease and early death.","During deep sleep, the brain clears beta-amyloid and tau proteins via the glymphatic system.","Alcohol disrupts REM sleep, reducing memory consolidation and emotional regulation.","Morning sunlight exposure within 30-60 minutes of waking is one of the highest-impact free health behaviors.","High-protein brea lity matters for cooking fats — saturated fats resist oxidation; polyunsaturated fats don't.","Avocado oil has a high smoke point (520°F) and is stable for high-heat cooking.","NOVA food classification system (Monteiro) rates food by degree of processing.","Food addiction shares neural circuitry with substance addiction.","The bliss point is a calculated ratio of sugar, fat, and salt designed for maximum palatability.","Metabolic syndrome affects 1 in 3 Americans.","Non-alcoholic steatohepatitis (NASH) can progress to cirrhosis — driven by diet.","Sleep deprivation raises ghrelin (hunger hormone) by 28% and lowers leptin (satiety) by 18%.","Smell contributes 80% to perceived taste.","The umami flavor was identified as the fifth basic taste in 1908.","Bitterness sensitivity is genetic — supertasters (25% of population) taste bitterness 3x more intensely.","Cooking at high heat creates acrylamide — a potential carcinogen found in starchy foods.","Marinating meat in acid (lemon, vinegar) before grilling reduces carcinogen formation by 90%.","Fiber from diverse sources produces the greatest microbiome benefit.","Resistant starch (in cooled cooked potatoes, green bananas) is prebiotic — feeding gut bacteria.","Reheating cooked pasta or potatoes increases their resistant starch content.","Butyrate (short-chain fatty acid from fiber fermentation) is the primary fuel for colon cells.","Polyphenols feed Akkermansia muciniphila — a gut bacterium linked to metabolic health.","Eating 30+ different plant foods per week is associated with the greatest gut microbiome diversity.","Fermented foods (kimchi, sauerkraut, yogurt, kefir) contain live beneficial bacteria.","Traditional sourdough fermentation can reduce phytic acid by up to 90%, improving mineral absorption.","Whole eggs are one of the most nutrient-dense foods — containing all 9 essential amino acids.","Egg yolks contain choline — critical for brain health and fetal neural development.","Liver is the most nutrient-dense food per calorie.","Wild-caught salmon has 2-3x more omega-3s than most farmed salmon.","Sardines are among the safest fish for mercury content and highest in omega-3s.","Walnuts are the only nut with significant ALA (plant omega-3) content.","Sweet potatoes have among the highest antioxidant content of all vegetables.","Purple foods (blueberries, red cabbage, black beans) contain anthocyanins — powerful antioxidants.","Fermented soy (miso, tempeh, natto) is more bioavailable than unfermented soy.","Natto contains nattokinase — an enzyme with documented fibrinolytic (clot-dissolving) properties.","GLP-1 agonists (Ozempic, Wegovy) represent the most effective pharmaceutical obesity treatment discovered.","Wegovy trials showed average 15-17% body weight reduction.","The gut-immune axis: 70% of the immune system is located in the gut-associated lymphoid tissue.","Nutritional psychiatry is an emerging field linking diet directly to mental health outcomes.","A single session of moderate exercise improves insulin sensitivity for 24-48 hours.","Visceral fat (intra-abdominal) is metabolically active — releasing inflammatory cytokines.","Waist circumference is a better predictor of metabolic risk than BMI.","A waist-to-height ratio below 0.5 is associated with significantly reduced cardiometabolic risk.","High-protein diets slightly increase metabolism (thermic effect) during weight loss.","Beet juice contains nitrates that convert to nitric oxide — enhancing blood flow and athletic performance.","Tart cherry juice reduces exercise-induced muscle soreness and improves sleep.","Coffee consumption is associated with reduced risk of type 2 diabetes, liver disease, and Parkinson's.","Sleep deprivation for one week reduces testosterone levels by 10-15% in young men.","Microwaving vegetables preserves more nutrients than boiling.","Steaming is the best cooking method for retaining nutrients.","Brown rice retains the bran layer — it has more fiber, vitamins, and minerals than white ude training increases red blood cell count — used by elite endurance athletes.","Balance training (single-leg standing) reduces fall risk in older adults significantly.","Exercise increases BDNF (brain-derived neurotrophic factor) — the brain's growth hormone.","Heat exposure (sauna, hot bath) improves cardiovascular function and heat shock proteins.","The French paradox (high fat diet, low heart disease) is partly explained by fermented food and wine.","Alcohol is a Group 1 carcinogen — any amount increases cancer risk.","Even light drinking (1 drink/day) modestly increases breast cancer risk.","Seed oils (canola, soybean, corn) are high in omega-6 linoleic acid.","Beet juice contains nitrates that enhance blood flow and athletic performance.","Brown rice retains the bran layer — more fiber, vitamins, and minerals than white rice.","Iodized salt was introduced in the 1920s — eliminating goiter from large parts of the world.","Eating speed matters: fast eaters are 3x more likely to be overweight.","Chewing each bite 20-30 times improves digestion and reduces calorie intake.","The Maillard reaction (browning of food) creates hundreds of flavor compounds.","Pressure cooking (Instant Pot) reduces cooking time by 70% and retains more nutrients than boiling.","Raw honey contains approximately 22 amino acids, 31 different minerals, and enzymes.","Manuka honey has documented antimicrobial properties — used in medical wound dressings.","Turmeric (curcumin) has anti-inflammatory properties — absorption requires fat and black pepper.","Saffron has shown antidepressant effects in multiple RCTs — comparable to fluoxetine.","Ashwagandha reduces cortisol by 30% in clinical trials and improves sleep quality.","Lion's mane mushroom promotes NGF (nerve growth factor) and improves cognitive function in studies.","Rhodiola rosea reduces mental fatigue and improves cognitive performance under stress.","Bacopa monnieri improves memory formation — but requires 8-12 weeks of consistent s l tool — its use as a health metric is widely criticized.","A 5-10% body weight reduction produces outsized metabolic improvements in obese individuals.","Excess adiposity (especially visceral) is more important than total body weight for health risk.","Alcohol provides 7 kcal/gram — nearly as calorie-dense as fat — with zero nutritional value.","Coffee suppresses appetite and slightly increases metabolic rate for 3-4 hours.","Matcha has sustained energy release with lower peak cortisol than coffee due to L-theanine.","Polyphenol-rich diets reduce blood pressure comparably to low-dose antihypertensives in some studies.","Hibiscus tea reduces blood pressure in multiple clinical trials.","Berberine reduces blood sugar as effectively as metformin in one clinical trial.","Psyllium husk is the most evidence-based fiber supplement for cholesterol and blood sugar.","Oat beta-glucan (3g/day) reduces LDL cholesterol by approximately 5-10%.","Natto contains the highest plant source of vitamin K2 — essential for bone and cardiovascular health.","Post-workout protein timing (within 2 hours) maximizes muscle protein synthesis.","Essential amino acids, especially leucine (3g/serving), trigger muscle protein synthesis.","Eating while distracted increases calorie intake by up to 30%.","GLP-1 hormones are released after eating — now mimicked by pharmaceuticals for obesity treatment.","Polyphenols in extra virgin olive oil activate SIRT1 — a longevity-associated gene pathway.","Whole grains reduce cardiovascular disease risk by 20-30% compared to refined grains.","Legume consumption (beans, lentils, chickpeas) is the most consistent predictor of longevity across Blue Zones.","Drinking green tea is associated with a 20-30% lower risk of stroke in large cohort studies.","Garlic supplementation reduces blood pressure by approximately 8-10 mmHg in hypertensive patients.","Collagen peptide supplementation improves skin elasticity in studies involving women over 35.","Intermittent fasting
