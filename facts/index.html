lant cell walls are made of cellulose — the most abundant organic polymer on Earth.","Lignin (in wood) is the second most abundant organic polymer — extremely resistant to decomposition.","Nitrogen fixation by bacteria converts atmospheric N₂ into ammonia — essential for plant growth.","The Haber-Bosch process industrially fixes nitrogen — feeding about half the world's population.","Without synthetic nitrogen fertilizer, approximately 40% of the global population would not exist.","Photosynthesis requires carbon dioxide, water, and light — producing glucose and oxygen.","Combustion is the reverse of photosynthesis — releasing stored chemical energy as heat and light.","Entropy always increases in a closed system — the second law of thermodynamics.","Absolute zero (-273.15°C) is the coldest possible temperature — atoms have minimum possible energy.","Liquid helium must be used to reach near-absolute-zero temperatures in labs.","Bose-Einstein condensate forms near absolute zero — particles occupy the same quantum state.","Superconductivity occurs at near-absolute-zero — electrical resistance drops to zero.","Room-temperature superconductors would transform energy transmission and computing.","The LHC (Large Hadron Collider) is the world's largest machine — 27 km in circumference.","The LHC produces collisions at 13.6 TeV of energy — recreating conditions near the Big Bang.","The Higgs boson was predicted in 1964 and confirmed experimentally in 2012.","Neutrinos have almost no mass and pass through matter almost unimpeded.","Approximately 100 trillion neutrinos pass through your body every second.","Antimatter exists — and annihilates with normal matter to release energy.","PET scans use positrons (antimatter) to image metabolic activity.","Nuclear fission splits heavy atoms — used in power plants and atomic bombs.","Nuclear fusion combines light atoms — the energy source of stars.","Fusion energy is 'always 20 years away' — but NIF achieved ignition in 2022.","NIF (National Ignition Facility) produced more energy from fusion than the laser input in 2022.","One gram of fusion fuel (deuterium-tritium) contains energy equal to 8 tons of coal.","The strongest acid (fluoroantimonic acid) is 20 quadrillion times more acidic than pure sulfuric acid.","Water expands when it freezes — one of very few substances that do.","This anomalous expansion allows ice to float — essential for life in frozen climates.","Water has extremely high specific heat — moderating Earth's climate.","The dipole moment of water makes it an excellent solvent — the 'universal solvent.'","Surface tension allows insects to walk on water — it's strong enough to support 70 dyne/cm.","Sound travels about 5x faster through water than air.","Light slows down in denser media — Snell's Law governs refraction.","A laser emits coherent, monochromatic light — invented by Theodore Maiman in 1960.","Lasers are used in surgery, cutting steel, Blu-ray players, and data transmission.","Fiber optic cables carry data as pulses of light — at speeds approaching light's maximum.","LED (light-emitting diode) technology uses p-n junctions to convert electricity to light.","Semiconductors have electrical conductivity between conductors and insulators.","Doping semiconductors adds impurities that allow electron control.","Transistors switch and amplify electrical signals — the building block of all electronics.","One modern microchip contains more transistors than there are neurons in a human brain.","Quantum mechanics describes the behavior of particles at subatomic scales.","The photoelectric effect (Einstein's 1905 paper) demonstrated light has particle properties.","Wave-particle duality means quantum objects behave as both waves and particles.","Electrons in atoms occupy discrete energy levels — they emit photons when dropping to lower levels.","Different atoms emit characteristic spectra — used to identify elements in stars.","The Copenhagen interpretation says quantum states collapse only upon measurement.","Many-worlds interpretation says all quantum outcomes exist in branching universes.","Bell's theorem proved quantum mechanics cannot be explained by hidden variables.","Quantum computers exploit superposition and entanglement — exponentially more powerful for certain problems.","The periodic table's arrangement predicted properties of then-unknown elements.","Mendeleev's periodic table (1869) left gaps for undiscovered elements — all later found.","Noble gases (helium, neon, argon) are highly unreactive due to full electron shells.","Fluorine is the most reactive element — it corrodes nearly everything.","Osmium is the densest element — 22.59 g/cm³.","Hydrogen bonding is the key interaction that gives water and DNA their critical properties.","Chirality (handedness) is critical in biochemistry — one mirror image of a molecule can be toxic.","Thalidomide's tragedy (1950s) was caused by one chiral form being harmful.","Enzymes are biological catalysts — they speed up reactions without being consumed.","Most enzymes are proteins with precisely shaped active sites.","The lock-and-key model describes enzyme-substrate specificity.","Allosteric regulation changes enzyme shape to turn activity on or off.","ATP (adenosine triphosphate) is the universal energy currency of living cells.","Cells produce ATP through glycolysis, the Krebs cycle, and oxidative phosphorylation.","Anaerobic respiration (without oxygen) produces ATP but far less efficiently.","Fermentation is a form of anaerobic respiration — producing alcohol or lactic acid.","CRISPR-Cas9 was adapted from a bacterial immune system.","Jennifer Doudna and Emmanuelle Charpentier won the Nobel Prize in Chemistry for CRISPR in 2020.","Stem cells can differentiate into any cell type — key to regenerative medicine.","Induced pluripotent stem cells (iPSCs) can be grown from adult cells — no embryos needed.","Telomeres shorten with each cell division — a counting mechanism for aging.","Telomerase enzyme extends telomeres — overactive in most cancers.","Senescent cells accumulate with age — they resist dying and secrete inflammatory signals.","Apoptosis (programmed cell death) removes damaged cells cleanly.","Necrosis is uncontrolled cell death — causes inflammation.","Cancer is fundamentally uncontrolled cell growth — driven by mutations in growth-regulating genes.","Tumor suppressor genes (p53, BRCA1) prevent cancer — their loss drives malignancy.","Oncogenes (like RAS, MYC) drive uncontrolled cell growth when mutated.","Each cell division introduces an average of 1-2 new mutations.","The human immune system produces about 10 billion different antibody types.","B cells produce antibodies; T cells kill infected cells and regulate immunity.","mRNA vaccines deliver genetic instructions — the cell makes the target protein itself.","Blood types (ABO) are determined by cell surface antigens.","Universal donor blood type is O negative; universal recipient is AB positive.","The brain uses approximately 20% of the body's total energy — despite being only 2% of body weight.","Neurons in the brain fire electrochemical signals at up to 100 meters per second.","The human brain has approximately 86 billion neurons.","Each neuron forms thousands of synaptic connections — estimated 100-500 trillion synapses.","The Krebs cycle (citric acid cycle) is the central metabolic pathway in aerobic organisms.","ATP synthase is a molecular machine that rotates as protons flow through it — producing ATP.","PCR (polymerase chain reaction) amplifies specific DNA sequences exponentially.","DNA sequencing costs have fallen from $3 billion (Human Genome Project) to under $1,000.","Cryo-electron microscopy (cryo-EM) allows imaging of proteins at near-atomic resolution.","Cryo-EM won the 2017 Nobel Prize in Chemistry — revolutionizing structural biology.","Optogenetics uses light-sensitive proteins to activate specific neurons.","Brain organoids (mini-brains grown from stem cells) are used to study neurological disease.","The default mode network (DMN) activates during rest — discovered by accident.","Alzheimer's disease hallmarks: tau and beta-amyloid protein aggregates.","Anti-amyloid antibodies (lecanemab, donanemab) showed modest slowing of Alzheimer's progression.","CRISPR gene therapy for Huntington's disease is in early clinical trials.","Epigenetic clocks (Horvath clock) can estimate biological age from DNA methylation patterns.","Senolytics are drugs that clear senescent cells — extending healthspan in mice.","Caloric restriction by 30% extends lifespan in rodents, primates, and likely humans.","The TAME trial is testing metformin's ability to delay multiple age-related diseases simultaneously.","Yamanaka factors can reprogram adult cells back to pluripotency.","Partial reprogramming using Yamanaka factors has reversed aging markers in aged mice.","Liquid biopsy detects circulating tumor DNA — enabling early cancer detection.","Multi-cancer early detection tests (Galleri) use methylation patterns to detect 50+ cancers.","Immunotherapy PD-1/PD-L1 blockade has transformed treatment of melanoma and lung cancer.","CAR-T therapies have achieved complete remission in some previously terminal blood cancers.","The vaginal microbiome (Lactobacillus-dominant) is protective against HPV and cervical cancer.","HPV vaccines prevent approximately 90% of cervical cancers.","EBV infection is now established as a prerequisite for multiple sclerosis development.","Herpes simplex virus reactivation may contribute to Alzheimer's disease.","Chronic inflammation (inflammaging) accelerates virtually all age-related diseases.","The resolution of inflammation is an active process — not just cessation of inflammatory signals.","Specialized pro-resolving mediators (SPMs) include resolvins, protectins, and maresins.","Biologics (TNF inhibitors) transformed treatment of rheumatoid arthritis and Crohn's disease.","Autoimmune diseases are rising in incidence globally — hygiene hypothesis attributes this to reduced childhood infection.","EBV is the virus behind mononucleosis and is linked to multiple sclerosis and some cancers.","Stem cell transplantation has achieved functional cure of Type 1 diabetes in some patients.","Fecal transplants improve symptoms of inflammatory bowel disease.","The vagus nerve stimulation reduces inflammation — approved for epilepsy, now studied for autoimmune disease.","Coherent breathing (5-6 breaths/minute) maximizes heart rate variability and vagal tone.","Nuclear magnetic resonance (NMR) spectroscopy reveals molecular structure in solution.","AlphaFold (DeepMind) solved the protein folding problem — predicting 3D structure from amino acid sequence.","The human proteome contains approximately 20,000 different proteins.","RNA interference (RNAi) uses small RNA molecules to silence specific genes.","RNAi won the Nobel Prize in Physiology or Medicine in 2006.","Epigenetics studies heritable changes in gene expression that don't involve DNA sequence changes.","DNA methylation is the most studied epigenetic mark — represses gene expression.","Histone modification changes how tightly DNA is wound — affecting gene accessibility.","The microbiome outnumbers human cells approximately 1.3:1.","Bacteriophages (viruses that infect bacteria) may offer a solution to antibiotic resistance.","MRSA (methicillin-resistant Staphylococcus aureus) kills more Americans than HIV/AIDS annually.","Antibiotic resistance is projected to cause 10 million deaths per year by 2050.","The last new class of antibiotics was discovered in the 1980s.","Penicillin was discovered by Alexander Fleming in 1928 when mold contaminated a petri dish.","Fleming, Florey, and Chain shared the 1945 Nobel Prize for developing penicillin as a medicine.","Science uses falsifiability (Popper) as a criterion for legitimate scientific claims.","The scientific method: observation, hypothesis, experiment, analysis, conclusion, peer review.","Peer review has flaws — replication crisis revealed many psychology findings don't replicate.","Only about 36-47% of psychology studies successfully replicate.","Pre-registration (declaring hypotheses before experiments) reduces p-hacking.","P-hacking artificially produces statistically significant results through repeated testing.","A p-value of 0.05 means a 5% probability of observing results if null hypothesis is true.","Bayesian statistics provides a framework for updating beliefs with new evidence.","Correlation does not imply causation — a critical principle in science.","Confounding variables are the most common cause of misleading observational studies.","Randomized controlled trials (RCTs) are the gold standard for causal inference.","Blind and double-blind trials eliminate observer and subject bias.","Meta-analysis pools data from multiple studies — the highest level of evidence.","The 'file drawer problem' means negative results are underreported — biasing the literature.","Open science initiatives (pre-registration, data sharing) are improving research integrity.","Science progresses through paradigm shifts (Kuhn) — not smooth accumulation.","The Copernican Revolution is the classic paradigm shift — Earth moves around the Sun.","Plate tectonics was rejected for decades before evidence became undeniable in the 1960s.","Continental drift was proposed by Alfred Wegener in 1912 — rejected until seafloor spreading confirmed it.","Germ theory replaced miasma theory in the 19th century — transforming medicine.","Ignaz Semmelweis proved handwashing prevented childbed fever in 1847 — and was rejected by contemporaries.","Helicobacter pylori causes most peptic ulcers — Barry Marshall drank H. pylori to prove it.","Barry Marshall won the 2005 Nobel Prize for discovering H. pylori's role in ulcers.","The replication crisis is a major challenge — especially in social psychology and medicine.","Newton's three laws of motion describe how forces affect objects — published in Principia, 1687.","The law of conservation of energy: energy cannot be created or destroyed, only transformed.","The law of conservation of momentum: total momentum of a closed system remains constant.","Maxwell's equations unify electricity and magnetism — predicting electromagnetic waves.","Maxwell predicted in 1865 that light was an electromagnetic wave.","Planck's constant (h) defines the quantum of action — the smallest possible unit of energy change.","Einstein's 1905 'miracle year' produced papers on special relativity, Brownian motion, and the photoelectric effect.","De Broglie proposed in 1924 that matter has wave properties — confirmed by electron diffraction.","Schrödinger's wave equation describes the evolution of quantum states over time.","The Born rule: the square of the wave function gives the probability of finding a particle.","Pauli exclusion principle: no two fermions can occupy the same quantum state simultaneously.","This principle is why matter is solid — electrons can't all collapse to the lowest energy level.","Bosons (like photons) are not subject to the Pauli exclusion principle — they can bunch.","Quarks carry fractional electric charges — never found isolated (confinement).","Protons and neutrons are each made of three quarks held together by gluons.","The strong nuclear force is mediated by gluons — far more powerful than electromagnetism at short range.","Quantum chromodynamics (QCD) describes the strong force — quarks carry 'color' charge.","The weak force is responsible for radioactive beta decay — converting neutrons to protons.","W and Z bosons mediate the weak force — discovered at CERN in 1983.","Electroweak unification (Glashow, Salam, Weinberg) won the 1979 Nobel Prize.","Feynman diagrams are a visual tool for calculating quantum interaction probabilities.","Quantum field theory treats particles as excitations of underlying fields.","The vacuum is not empty — it seethes with virtual particle-antiparticle pairs.","The Casimir effect demonstrates vacuum energy — two metal plates attract due to reduced vacuum fluctuations.","Quantum tunneling enables nuclear fusion in the Sun — particles tunnel through energy barriers.","Alpha decay (radioactivity) is explained by quantum tunneling through the nuclear potential barrier.","Half-life describes radioactive decay probability — independent of temperature or chemical state.","Carbon-14 dating works because its half-life (5,730 years) is well-calibrated to atmospheric production.","Uranium-lead dating measures timescales of billions of years with high accuracy.","Potassium-argon dating revolutionized paleoanthropology — dating hominid fossils precisely.","The law of superposition: deeper rock layers are older — fundamental to geology and paleontology.","Index fossils allow correlation of rock strata across different locations.","The Cambrian Explosion (~540 million years ago) produced most major animal body plans.","The Permian-Triassic extinction (252 million years ago) killed ~96% of all marine species.","The K-Pg extinction (66 million years ago) was caused by a 10-km asteroid impact.","The Chicxulub impactor created a crater 180 km wide — still detectable under the Gulf of Mexico.","Mammals diversified explosively after the K-Pg extinction removed dinosaur competition.","Endosymbiotic theory explains how mitochondria and chloroplasts were once free-living bacteria.","Horizontal gene transfer allows bacteria to rapidly acquire new traits — including antibiotic resistance.","Evolution operates on variation, selection, heredity, and time — Darwin's four requirements.","Sexual selection explains features that reduce survival but increase reproductive success.","Kin selection (Hamilton's rule) explains altruism toward genetic relatives.","Reciprocal altruism explains cooperation between non-relatives.","The Modern Synthesis combined Darwinian evolution with Mendelian genetics.","Neutral evolution (Kimura): most genetic variation is selectively neutral — shaped FCs is the most successful environmental treaty.","Ozone layer recovery is on track — expected full recovery by 2066.","Acid rain was a major environmental crisis of the 1970s-80s — addressed by SO₂ emission reductions.","The pH scale is logarithmic — each unit represents 10x difference in acidity.","Pure water has a pH of 7.0 — neutral; stomach acid is pH 1.5-3.5.","Ocean pH has dropped from 8.2 to 8.1 since industrialization — 30% increase in acidity.","Free energy (Gibbs or Helmholtz) determines whether a chemical reaction will occur spontaneously.","Catalysts lower activation energy — they are not consumed and do not change equilibrium.","Industrial catalysts (platinum, palladium, zeolites) drive most chemical manufacturing.","Le Chatelier's principle: a system at equilibrium shifts to counteract applied stress.","Osmosis moves water through semipermeable membranes from low to high solute concentration.","Cell turgor pressure is maintained by osmosis — plants wilt when water is lost.","Spectroscopy identifies elements and molecules by their interaction with light.","Mass spectrometry identifies molecules by mass-to-charge ratio — used in forensics, drug testing, and biology.","X-ray crystallography determines atomic structure of crystals — discovered the structure of DNA.","Atomic force microscopy (AFM) can image individual atoms and molecules on surfaces.","CERN's Large Hadron Collider found the Higgs boson but no new physics beyond the Standard Model so far.","Muon g-2 experiment measured a slight discrepancy from Standard Model predictions — potential new physics.","Neutrino oscillation proved neutrinos have mass — required adding neutrino mass to the Standard Model.","Dark matter searches have ruled out large parts of WIMP parameter space without detection.","Space weather forecasting is critical — a Carrington-level event today could cause $2 trillion in damage.","CO₂ concentrations are higher today than at any point in the last 800,000 years — from ice cores.","Earth's average temperature has risen ~1.2°C since pre-industrial times — about 1880.","Climate feedback mechanisms (ice-albedo, water vapor) amplify initial warming.","The scientific consensus on human-caused climate change is 97%+ among publishing climate scientists.","Natural variability (solar cycles, volcanic eruptions) cannot explain observed warming."],"Psychology":["Cognitive biases are systematic patterns of deviation from rationality in judgment.","The confirmation bias leads people to seek information that confirms existing beliefs.","The availability heuristic causes people to overestimate the probability of events they can easily recall.","The anchoring effect makes the first number seen disproportionately influence subsequent estimates.","Dunning-Kruger effect: people with limited knowledge overestimate their competence.","People who are truly expert in a domain often underestimate their abilities compared to novices.","Loss aversion: people feel losses roughly twice as intensely as equivalent gains.","The endowment effect makes people value items they own more than items they don't.","Sunk cost fallacy: continuing an activity because of past investment, ignoring current/future value.","Cognitive dissonance is the discomfort from holding contradictory beliefs simultaneously.","The halo effect: one positive trait leads to assumption of other positive traits.","The fundamental attribution error: overvaluing character/personality and undervaluing situation.","The spotlight effect makes people think others are more aware of their actions than they are.","First impressions form within 100 milliseconds — primarily from facial features.","The false consensus effect: people overestimate how common their opinions are in others.","Social proof: people look to others' behavior when uncertain.","Authority bias: people comply with perceived authority even without legitimate reason (Milgram experiment).","Milgram's obedience studies showed 65% of participants administered apparently lethal shocks on authority.","Groupthink leads to conformity pressure that suppresses dissent and careful analysis.","The bystander effect: people are less likely to help in emergencies when others are present.","Diffusion of responsibility is the mechanism behind the bystander effect.","Social facilitation: presence of others improves performance on well-learned tasks.","Social loafing: people exert less effort in a group than individually.","Learned helplessness (Seligman) occurs when repeated uncontrollable events lead to passive acceptance.","Optimism bias: most people believe they are more likely than others to experience positive events.","Planning fallacy: projects consistently take longer and cost more than predicted.","IKEA effect: people value things they built or assembled more than equivalent ready-made items.","Scarcity effect: limited availability makes items more desirable.","The mere exposure effect: familiarity increases liking.","The reciprocity principle: receiving something creates psychological obligation to give back.","Cialdini's 6 principles of persuasion: reciprocity, commitment, social proof, authority, liking, scarcity.","The peak-end rule: memories of experiences are dominated by the most intense and final moments.","Hedonic adaptation makes most life changes return to baseline happiness quickly.","Lottery winners are no happier 1 year after winning than before.","The happiness set point is influenced heavily by genetics (~50%).","Social relationships are the strongest predictor of long-term wellbeing.","The quality of close relationships predicts physical health at age 80 better than cholesterol levels.","Loneliness is associated with accelerated cognitive decline and early death.","Gratitude journaling measurably increases wellbeing in RCTs.","Acts of kindness boost the giver's mood more reliably than spending on oneself.","Experiences produce more lasting happiness than material purchases.","Sleep deprivation significantly impairs emotional regulation — the brain becomes 60% more reactive to negative stimuli.","Exercise is as effective as antidepressants for mild-to-moderate depression.","CBT (Cognitive Behavioral Therapy) is the most evidence-based psychological intervention.","Exposure therapy is highly effective for phobias and OCD — it works by extinction learning.","Psychedelic-assisted therapy (psilocybin, MDMA) shows significant promise for PTSD, depression, and addiction.","MDMA-assisted therapy for PTSD achieved 67% full remission in Phase 3 trials.","Ketamine is the first new antidepressant mechanism approved in 60+ years.","Mindfulness-based cognitive therapy (MBCT) reduces depression relapse by 50%.","Sleep quality is the single most reliable predictor of next-day mood.","Working memory capacity is approximately 7±2 items.","Attention is a limited resource — multitasking actually involves rapid task-switching.","Flow state (Csikszentmihalyi): optimal experience when challenge matches skill level.","Children have a sensitive period for language acquisition.","Bilingualism delays the onset of Alzheimer's symptoms by 4-5 years.","The spacing effect: distributed practice is far more effective than massed practice (cramming).","Testing effect: being tested on material improves retention more than re-reading.","False memories can be implanted by suggestion.","Elizabeth Loftus demonstrated that eyewitness memory is highly malleable.","Eyewitness testimony is the leading cause of wrongful convictions.","Smell is the most direct sense connected to the limbic system — it bypasses the thalamus.","Pain catastrophizing amplifies pain experience.","The nocebo effect: negative expectations produce negative physical outcomes.","Social identity theory (Tajfel): people derive self-esteem from their group memberships.","In-group favoritism and out-group hostility emerge even from trivial, arbitrary group distinctions.","Terror management theory: awareness of mortality profoundly shapes human behavior and culture.","Self-determination theory identifies autonomy, competence, and relatedness as core psychological needs.","Extrinsic rewards can undermine intrinsic motivation (overjustification effect).","Growth mindset (Dweck): believing abilities can be developed leads to better outcomes.","Grit (Duckworth) predicts long-term success better than talent or intelligence in many domains.","Conscientiousness is the single personality trait most consistently linked to life outcomes.","Personality is approximately 50% heritable.","Big Five personality traits: Openness, Conscientiousness, Extraversion, Agreeableness, Neuroticism.","Personality is relatively stable after age 30 but can change with deliberate effort.","Attachment theory: early caregiving relationships form templates for adult relationships.","Anxious attachment style is associated with higher relationship conflict.","Secure attachment style is associated with better mental and physical health outcomes.","Social ostracism activates the same brain regions as physical pain.","Humans are highly social — isolation is physiologically harmful.","Propaganda works most effectively through repetition and emotional arousal, not logic.","Political beliefs are more driven by identity and social belonging than rational analysis.","Jonathan Haidt's Moral Foundations Theory identifies 6 moral foundations.","Prospect theory (Kahneman, Tversky) describes actual decision-making under risk.","Dual process theory: System 1 (fast, intuitive) and System 2 (slow, deliberate) thinking.","Most daily decisions are made by System 1 — gut instinct and pattern recognition.","Framing effect: the same information presented differently leads to different decisions.","Default options (opt-out organ donation) dramatically change behavior through inertia.","Nudge theory uses defaults, framing, and social proof to guide behavior without mandates.","Cognitive load theory: working memory has a limited capacity that must be managed in learning.","Self-perception theory (Bem): we infer our own attitudes from observing our own behavior.","Moral licensing: doing something virtuous makes people more likely to subsequently act unethically.","The better-than-average effect: most people rate themselves above average on positive traits.","Hindsight bias: after outcomes are known, people exaggerate how predictable they were.","Overconfidence effect: people are consistently more confident in their answers than accuracy warrants.","The clustering illusion: humans detect patterns in random data.","Gambler's fallacy: believing a random outcome is 'due' because of past outcomes.","Base rate neglect: ignoring statistical frequency when a vivid individual case is available.","Temporal discounting: future rewards are valued less — impulsive choices favor immediate rewards.","Status quo bias: people prefer the current state of affairs and resist change.","Action-inaction asymmetry: people feel worse about harms from action than equivalent harms from inaction.","Classical conditioning (Pavlov) links neutral stimuli to responses through repeated pairing.","Operant conditioning (Skinner) uses reinforcement and punishment to shape behavior.","Variable ratio reinforcement schedules produce the most persistent behavior — the slot machine principle.","Intermittent reinforcement creates stronger attachment than consistent reward.","Observational learning (Bandura): behavior is learned by watching and imitating others.","Intrinsic motivation produces higher quality work, more creativity, and greater persistence.","Sense of meaning and purpose is a stronger predictor of life satisfaction than pleasure alone.","Trauma in early childhood alters HPA axis function — increasing lifelong cortisol reactivity.","Adverse childhood experiences (ACEs) score predicts adult disease burden.","Neuroplasticity means even severe trauma responses can be rewired through targeted therapy.","Social media use is associated with higher depression and anxiety rates, especially in adolescent girls.","Instagram usage specifically correlates with body image dissatisfaction in teen girls.","Dopamine systems in the brain are exploited by social media notifications — variable reward schedules.","Rumination (dwelling on problems) is a key driver of depression and anxiety.","Behavioral activation (doing activities even without motivation) is the fastest anti-depressant treatment.","Journaling about emotions reduces their intensity — expressive writing effect.","Compassion meditation (loving-kindness) reduces implicit bias measurably.","Placebos can work even when patients know they're taking a placebo — 'open label placebos.'","Hypnosis is a genuine neurological state — it alters activity in suggestion-relevant areas.","Cognitive reframing — changing the interpretation of events — is the core mechanism of CBT.","Acceptance and Commitment Therapy (ACT) teaches defusion from distressing thoughts.","Psychological safety at work is the leading predictor of high-performing teams (Google Project Aristotle).","John Gottman identified the '4 Horsemen' (criticism, contempt, defensiveness, stonewalling) as divorce predictors with 94% accuracy.","Contempt is the single most toxic behavior in intimate relationships.","Active listening significantly improves communication quality.","Social comparison drives much human behavior — particularly upward comparison increases dissatisfaction.","Self-compassion predicts resilience better than self-esteem — it doesn't depend on performance.","Psychological flexibility predicts wellbeing across many domains.","Labeling emotions reduces amygdala activation — 'name it to tame it' is neurologically supported.","Gratitude specifically activates the medial prefrontal cortex and reward pathways.","Awe experiences (grand natural scenery, great art) reduce inflammation.","The Pygmalion effect: high expectations produce higher performance.","Stereotype threat reduces performance among people who fear confirming a negative stereotype.","Priming: exposure to one stimulus influences response to a subsequent stimulus.","Context-dependent memory: people recall information better in the same environment they learned it.","State-dependent memory: emotional state during learning affects retrieval.","Phantom limb pain is generated by the brain — the limb's cortical map remains active.","Human behavior is significantly shaped by unconscious processes.","Choice blindness: people confabulate reasons for choices they didn't actually make.","Change blindness: major changes in a visual scene go unnoticed if attention is elsewhere.","Mindfulness meditation reduces activity in the default mode network.","8 weeks of mindfulness training produces measurable changes in brain structure.","Emotions are not universal — their expression varies significantly across cultures.","Paul Ekman identified 6 basic emotions: happiness, sadness, fear, disgust, anger, surprise.","Anger is often a secondary emotion — covering fear, shame, or sadness.","Emotional granularity (precise labeling of emotions) predicts better emotional regulation.","Alexithymia (difficulty identifying emotions) is associated with poor health outcomes.","Emotional suppression increases physiological stress and worsens long-term outcomes.","Emotional disclosure (talking or writing about feelings) improves immune function and wellbeing.","Anticipatory anxiety is often worse than the actual feared event.","Anxiety disorders are the most common mental health disorders globally.","The amygdala's threat response fires before conscious awareness — a survival feature.","OCD involves overactive error-detection circuits in the orbitofrontal cortex.","Schizophrenia has a heritability of approximately 80% — one of the highest in psychiatry.","ADHD involves dysregulation of dopamine and norepinephrine in prefrontal circuits.","Stimulant medications for ADHD are among the safest long-term psychiatric medications.","Autism spectrum disorder is extraordinarily heterogeneous — it is not one thing.","The gut-brain axis in autism: 50-80% of autistic individuals have GI disturbances.","Trauma and personality disorders frequently co-occur.","EMDR (Eye Movement Desensitization and Reprocessing) is an evidence-based trauma treatment.","Prolonged Exposure (PE) therapy is the most-studied treatment for PTSD.","Ketamine dramatically reduces suicidal ideation within hours — unlike SSRIs which take weeks.","Suicidal ideation often fluctuates — short-term crisis intervention saves lives.","Means restriction (gun locks, bridge barriers) significantly reduces suicide rates.","Crisis hotlines reduce short-term suicide risk — the 988 Lifeline replaced 1-800-273-TALK in 2022.","Depression affects approximately 280 million people globally.","Major depressive disorder is the leading cause of disability worldwide.","Interpersonal therapy (IPT) is as effective as CBT for depression.","Exercise dose for antidepressant effects: 30 min, 3x/week, moderate to vigorous intensity.","Circadian disruption (shift work, late nights) doubles the risk of depression.","Light affects serotonin, melatonin, and cortisol — three key regulators of mood.","Social rhythm therapy stabilizes daily routines — effective for bipolar disorder.","Moral injury (violating one's own values) is distinct from PTSD and requires different treatment.","Post-traumatic growth is a real phenomenon — trauma can produce positive psychological change.","Resilience is not a trait — it is a process influenced by resources, relationships, and skills.","Adversity in moderate doses produces resilience — too little or too much is harmful.","Narrative therapy helps people reauthor their life stories — shifting from deficit to strength framing.","Positive psychology shifted focus from pathology to flourishing.","Character strengths (Peterson, Seligman) predict wellbeing more strongly than IQ.","Creativity is associated with higher openness to experience and moderate arousal states.","Default mode network is the seat of imagination, self-reference, and future simulation.","Executive function (prefrontal cortex) is not fully developed until approximately age 25.","Adolescent risk-taking is partially explained by the maturity gap between limbic and prefrontal development.","Emotional intelligence can be trained — unlike IQ, which is relatively fixed.","Empathy activates the same brain regions as the experience being empathized with.","People mirror others' body language and speech patterns unconsciously.","Repair after conflict is more predictive of relationship health than the absence of conflict.","The average person spends about 70% of communication time listening — and retains only 25%.","Trust is built in small moments — through reliability, vulnerability, and consistent behavior.","Sleep consolidation of emotional memories selectively strengthens positive over negative ones.","Memory consolidation during sleep determines which memories are retained.","Sleep deprivation for 24 hours produces impairment equivalent to a 0.10 blood alcohol level.","Chronic mild sleep restriction (6 hours/night) produces deficits people don't perceive in themselves.","Daydreaming occupies about 47% of waking time in the average person.","Excessive mind-wandering correlates with unhappiness — presence correlates with positive affect.","Meditation can measurably increase gray matter density in prefrontal cortex areas.","The positivity-negativity asymmetry: negative events affect us more than equivalent positives.","Well-being has distinct hedonic (pleasure) and eudaimonic (meaning) components.","Social dominance orientation (SDO) predicts support for hierarchy-maintaining attitudes.","Implicit bias tests (IAT) measure unconscious associations that predict discriminatory behavior.","The Baader-Meinhof phenomenon: noticing something more after recently learning about it.","Inattentional blindness: failing to notice unexpected stimuli when focused on another task.","The invisible gorilla experiment demonstrated that focused attention causes major perceptual misses.","Decision fatigue: the quality of decisions deteriorates after long periods of deciding.","Ego depletion (Baumeister): self-control is a limited resource that gets depleted.","Ego depletion has faced replication problems — it may be dependent on beliefs about willpower.","The WOOP technique (Wish, Outcome, Obstacle, Plan) improves goal attainment vs. positive visualization alone.","Mental contrasting (imagining the goal AND the obstacles) is more motivating than pure positive thinking.","Implementation intentions ('When X, I will Y') double the rate of goal follow-through.","If-then planning activates automatic responses — removing the need for willpower.","Commitment devices (public pledges, financial stakes) harness loss aversion for behavior change.","The 'fresh start effect': people are more motivated to pursue goals at temporal landmarks (New Year, birthday).","Self-affirmation interventions reduce defensiveness and increase receptiveness to threatening feedback.","Psychological distance (spatial, temporal, social) increases abstract thinking.","Near/far future thinking activates different neural systems — distant futures are represented abstractly.","Emotional granularity: having a rich vocabulary for emotions predicts better well-being and regulation.","Social pain and physical pain share neural substrates — social exclusion literally hurts.","The PERMA model (Positive emotions, Engagement, Relationships, Meaning, Accomplishment) describes flourishing.","Learned optimism (Seligman) can be taught — it's not fixed — and reduces depression risk by 50%.","Cognitive flexibility is a key component of resilience — the ability to see situations differently.","People underestimate the impact of conversations with strangers on their mood.","Talking to strangers on trains and buses consistently improves mood for both parties.","Happy memories fade more slowly than unhappy ones for most people over time.","Intrusive memories of traumatic events have involuntary, sensory-triggered nature.","Nostalgia increases social connectedness and reduces existential anxiety.","Music is processed by the same reward circuits as food and sex — activating dopamine.","Binaural beats at theta frequencies (4-8 Hz) are associated with improved creativity and insight.","Breathing rate of 5-6 breaths/min maximizes heart rate variability and parasympathetic tone.","Sustained eye contact for 10+ minutes can induce hypnotic-like altered states.","Loneliness is more common in young adults (18-22) than in elderly populations.","Loneliness activates the same sympathetic nervous system threat response as physical danger.","Social prescribing (doctors prescribing social activities) is being adopted by the UK NHS.","Community, purpose, and contribution are the three psychological factors most associated with late-life flourishing.","The self-serving bias attributes successes to internal factors and failures to external ones.","Comparative optimism: we believe negative events are more likely to happen to others than ourselves.","Terror management research shows that thinking about death increases national pride and in-group favoritism.","The mere measurement effect: simply asking about intentions increases the likelihood of performing them.","Visualization without process planning is ineffective or counterproductive for goal achievement.","Deliberate practice (Ericsson) requires pushing beyond comfort zone — not just repetition.","Expert intuition is pattern recognition built from thousands of hours of deliberate practice.","Thin-slicing (Gladwell): accurate snap judgments from minimal information in expert domains.","Verbal overshadowing: describing a visual memory immediately after encoding impairs later recall.","Retrieval-induced forgetting: recalling some information suppresses related information not recalled.","Source monitoring errors: forgetting where a memory came from — a major source of false memory.","The generation effect: generating material (self-testing) produces better memory than reading.","Metacognition (thinking about thinking) predicts learning outcomes more than raw intelligence.","Students who over-estimate their understanding (illusion of knowing) perform worse on tests.","The fluency illusion: material that's easy to read feels more learned — it often isn't.","Interleaving practice (mixing different problems) improves retention vs. blocked practice.","Deep processing (elaborating meaning) produces better retention than shallow processing (appearance).","Dual coding (pairing words with images) enhances memory encoding and retrieval."],"Life Hacks":["If you can complete a task in under 2 minutes, do it immediately — don't add it to a list.","The 2-minute rule (David Allen) prevents small tasks from accumulating into overwhelming lists.","Writing down tasks clears them from working memory — reducing cognitive load.","Weekly reviews of your task lists prevent important items from falling through the cracks.","Most productivity gains come from eliminating low-value tasks, not from working faster.","The Pareto Principle: 20% of activities produce 80% of results.","Identifying your top 3 priorities each morning produces measurably better outcomes.","Single-tasking on cognitively demanding work is more productive than multitasking.","Multitasking reduces performance quality on both tasks by up to 40%.","Batch similar tasks together to reduce context-switching overhead.","Schedule shallow work (email, admin) after your peak cognitive hours.","Peak cognitive hours vary — most people experience highest focus 1-3 hours after waking.","Night owls perform significantly better later in the day — forcing early schedules reduces output.","Use your phone's Do Not Disturb mode during deep work — notifications disrupt focus for 23 minutes.","Close unnecessary browser tabs before starting focused work — visual clutter increases cognitive load.","The Zeigarnik effect: incomplete tasks occupy mental RAM — write them down to close the loop.","A done list (what you accomplished) alongside a to-do list improves motivation and perspective.","Breaking large projects into next physical actions (GTD) removes the barrier of starting.","Activation energy for starting is often higher than the energy of continuing.","Working for 5 minutes on a dreaded task often eliminates the dread.","Deadlines, even self-imposed ones, significantly increase task completion rates.","Parkinson's Law: work expands to fill the time available — constrain time to force focus.","Use a timer (Pomodoro) to create urgency — 25 minutes focused, 5 minute break.","Pomodoro technique increases focus and reduces the appeal of distraction during the session.","After 4 Pomodoros, take a 20-30 minute break — allows consolidation of learned material.","Standing desks reduce afternoon energy slumps and improve focus for many people.","A short walk during lunch restores directed attention via involuntary attention restoration.","Natural light exposure (even through a window) improves mood and productivity during work hours.","Eye strain from screens reduces after following the 20-20-20 rule: every 20 min look 20 feet away for 20 seconds.","Proper monitor height (eyes level with top third of screen) prevents neck strain.","A desk height where forearms are parallel to the floor prevents repetitive strain injury.","Ergonomic chair setup: 90° at hips and knees, feet flat, back supported.","Keyboard and mouse at elbow height prevents carpal tunnel symptoms.","Cold water splashed on your face activates the diving reflex, immediately calming the nervous system.","Box breathing (4 counts inhale, 4 hold, 4 exhale, 4 hold) reduces anxiety rapidly.","Physiological sigh (double inhale through nose, long exhale through mouth) is the fastest way to reduce acute stress.","Humming activates the vagus nerve via vibration in the throat — calming in seconds.","Splashing cold water on wrists reduces body temperature quickly during overheating.","Lying on your back with legs elevated reduces lower back pain from prolonged sitting.","A tennis ball rolled under the foot relieves plantar fasciitis pain.","Applying arnica gel to bruises or sore muscles immediately reduces swelling.","Magnesium oil spray on legs before bed reduces nighttime leg cramps.","Drinking 16 oz of water immediately upon waking rehydrates after 8 hours of no fluid.","Keeping a glass of water on your nightstand eliminates the friction of morning hydration.","A consistent morning routine reduces decision fatigue before the workday begins.","Laying out tomorrow's clothes, bag, and gear before bed saves 10-15 minutes and mental energy.","Night-before preparation reduces cortisol levels in the morning.","Airplane mode on your phone during the first 60 minutes of the day prevents reactive mode.","Avoiding email in the first hour of the workday preserves your best cognitive energy for important work.","Checking email at set times (twice daily) dramatically reduces anxiety and improves focus.","Unsubscribing from one email newsletter per day for a month effectively clears inbox clutter.","Email filters that auto-label newsletters prevent them from polluting your action inbox.","A physical inbox tray on your desk centralizes all inbound items — preventing scatter.","One consistent to-do app beats many apps — consolidation reduces the time spent managing systems.","Paper to-do lists reduce app distraction for people who are prone to getting lost in tool features.","Analog timers (visible on desk) are more effective at driving urgency than phone timers.","Physical clutter creates psychological stress — removing items from sight reduces anxiety.","The '1 in, 1 out' rule for possessions prevents gradual clutter buildup.","Donate or discard anything not used in 12 months — with exceptions for seasonal items.","Photo documentation of sentimental items you don't need to keep makes parting easier.","Digitizing old photographs takes 1 weekend — services like ScanMyPhotos or Legacybox automate it.","Cloud backup protects against fire, theft, and hardware failure — rule of three: 2 local, 1 offsite.","Password managers (1Password, Bitwarden) generate and store secure unique passwords.","Using a password manager increases security and saves approximately 20 minutes/week.","Enable 2-factor authentication on all financial and email accounts — eliminates ~99% of account takeovers.","Hardware security keys (YubiKey) provide the strongest available 2FA.","Keep software updated — most major breaches exploit known vulnerabilities in outdated software.","A VPN on public Wi-Fi prevents passive interception of unencrypted traffic.","Incognito mode does not hide your identity from your ISP or employer — only from the local browser.","Use DNS-over-HTTPS to prevent ISP from logging your browsing history.","Freeze your credit at all three bureaus (free) — prevents new account fraud.","Alert services (Credit Karma, your bank's app) notify you of suspicious new inquiries.","Check your credit report annually at AnnualCreditReport.com — the only free federally mandated source.","Calling to negotiate bills (insurance, cable, phone) results in reduction 80% of the time.","Use the phrase 'I'm thinking about canceling' — triggers retention departments with better offers.","Auto-pay and autopay discounts are often worth setting up for recurring bills.","Buying in bulk (Costco, Sam's Club) saves 20-40% on non-perishables with regular use.","Price tracking tools (CamelCamelCamel for Amazon, Honey) prevent buying at temporary highs.","Waiting 48 hours before discretionary online purchases eliminates approximately 70% of impulse buys.","Unsubscribing from retailer emails reduces impulse purchase exposure significantly.","Use the 'needs vs. wants' test by imagining returning the item after having it for a week.","A 'no spend' weekend once a month builds awareness of habitual spending.","Tracking every expense for 30 days reveals spending patterns invisible without data.","Cash envelopes (or their digital equivalent) create hard spending limits that prevent overspending.","Saving automatically (direct deposit split, auto-transfer) produces more savings than manual saving.","Emergency fund in a high-yield savings account earns interest while remaining accessible.","HSA (Health Savings Account) is the only triple-tax-advantaged account — contribute maximum if eligible.","Max your 401(k) match before any other investment — it's a guaranteed 50-100% return.","Roth IRA contributions (after-tax) grow and are withdrawn tax-free — better for younger investors.","Index funds outperform actively managed funds in the long run about 80-90% of the time.","Dollar-cost averaging (investing fixed amounts regularly) outperforms market timing for most investors.","Tax-loss harvesting turns losing positions into tax deductions — automated by robo-advisors.","Negotiating your starting salary adds ~$5,000-$10,000 on average and compounds over a career.","The first 3 words of salary negotiations matter: 'Is there flexibility?' opens without demanding.","Asking for feedback after a rejection (job, pitch) provides actionable intelligence 40% of the time.","Following up once (7 days) after sending a resume or proposal doubles response rate.","LinkedIn profile with a professional photo gets 14x more views than one without.","Recommendations on LinkedIn (2-3 specific ones) are more valuable than endorsements.","Set your most important habit as the first thing you do after waking — before decision fatigue sets in.","Tie a new habit to an existing one using implementation intentions: 'After I pour coffee, I will meditate.'","The habit loop has three parts: cue, routine, reward — identify all three to change a habit.","Remove visual cues for bad habits and add visual cues for good ones.","Environment design beats motivation — optimize surroundings for the behavior you want.","Pre-commit devices (betting money, public commitments) leverage loss aversion for habit change.","For reading more, put your book on your pillow so you see it when you get into bed.","Use the two-day rule: never miss a habit two days in a row.","Identity-based habits are more durable than outcome-based habits.","Design your environment for tomorrow tonight — lower the barrier to your morning routine.","Keep workout clothes and gear beside your bed for frictionless exercise starts.","Batch cooking is the single most effective time-saving meal strategy for busy people.","Keep a consistent wake time even on weekends — it's more important than bedtime for circadian stability.","Bright light therapy (10,000 lux box) for 20-30 minutes in the morning treats seasonal depression.","Write out your worries before bed — externalizes the thought and reduces bedtime rumination.","Brain dumping (writing every thought before a task) clears mental RAM.","The weekly review (GTD) is the most powerful keystone habit for organized professionals.","Define 'done' before starting any project — fuzzy definition guarantees incomplete work.","Use friction to throttle bad decisions: delete apps, use website blockers, keep snacks out of reach.","Self-distancing ('What would a wise friend advise?') reduces emotional reactivity in decisions.","Talking to yourself in the third person reduces anxiety during stressful tasks.","Timeboxing (allocating specific time slots to tasks) prevents perfectionism from stalling completion.","Set an 'input budget' — limit the number of new inputs (books, podcasts, newsletters) you consume.","Annotate books as you read — highlights alone produce minimal retention.","Write one sentence per chapter summary immediately after reading — dramatically improves retention.","Spaced repetition software (Anki) is the most evidence-based method for memorizing large volumes of information.","Physical exercise bef at could be an email is one of the highest-ROI decisions at work.","Sending a meeting agenda 24 hours in advance reduces prep time for attendees by half.","Keeping meetings to 25 or 50 minutes (instead of 30 or 60) creates recovery buffer.","Ending meetings 5 minutes early builds goodwill and allows restroom breaks.","The parking lot technique (writing off-topic items on a sidebar) keeps meetings focused.","Sending meeting notes within 2 hours locks in commitments while memory is fresh.","Using 'labels' and 'filters' in Gmail automates 80% of inbox organization.","The archive button — not delete — preserves email history for future search.","Boomerang (Gmail plugin) returns emails to your inbox on a scheduled date.","Creating templates for the 10 most common emails you send saves 30+ minutes per week.","Text expander apps (TextExpander, Espanso) convert short codes into full text automatically.","Keyboard shortcuts reduce mouse usage by 80% in heavy software — worth the 1-week learning investment.","Window management tools (Rectangle for Mac, FancyZones for Windows) replace manual dragging.","Multiple monitors consistently increase productivity 20-30% in knowledge work.","Dimming overhead lights in the evening reduces cortisol and improves sleep onset.","Blue-light blocking glasses (or Night Shift mode) reduce sleep disruption from screens.","Keeping your phone outside the bedroom improves sleep quality and morning mood.","A sunrise alarm clock (gradual light increase) produces gentler, less groggy wake-ups.","Making your bed each morning provides a small, immediate win that primes a productive day.","A 5-minute morning journal (date, gratitude, intention) anchors the day's direction.","Three questions before bed: What went well? What could be better? What's tomorrow's focus?","Most people have a secondary productivity peak 7-8 hours after waking — use it for creative work.","The post-lunch dip (1-3 PM) is circadian — a 10-20 minute nap improves afternoon performanc e War of 1812 — it became the national anthem in 1931.","The Pledge of Allegiance was written in 1892 — 'under God' was added in 1954.","Mount Rushmore (1927-1941) was carved by 400 workers using dynamite.","The Statue of Liberty was a gift from France — dedicated in 1886.","The US has more cars than licensed drivers.","Americans spend an average of 17,600 hours of their life driving.","US healthcare costs average over $13,000 per person per year — highest in the world.","The US has the most MRI machines per capita of any country.","Life expectancy in the US (77 years) lags behind most peer nations.","The US has the highest obesity rate among developed nations — approximately 42%.","Type 2 diabetes affects over 37 million Americans.","Opioid overdoses kill approximately 80,000 Americans per year.","Fentanyl is now the leading cause of death for Americans aged 18-45.","Gun deaths (homicides, suicides, accidents) total approximately 45,000 per year in the US.","The US has more guns than people — approximately 400 million civilian-owned firearms.","The US mass shooting rate is 25x higher than other high-income countries.","The US has the world's highest incarceration rate — approximately 639 per 100,000 population.","About 2.1 million people are incarcerated in the US.","The US has more lawyers per capita than any other country — approximately 1.3 million.","The US Supreme Court decided Bush v. Gore (2000) effectively deciding the presidential election.","Roe v. Wade (1973) established a constitutional right to abortion — overturned by Dobbs in 2022.","The US has no federally guaranteed paid maternity leave — one of very few countries without it.","The US minimum wage ($7.25 federal) has not increased since 2009.","Over 30 states have higher minimum wages than the federal level.","The US public debt exceeds $34 trillion — about 120% of GDP.","US has no official language at the federal level — over 400 languages are spoken.","Spanish is spoken by approximately 41 million people in the US.","The US has more public libraries than McDonald's — approximately 17,000.","American Sign Language (ASL) is the third most commonly used language in the US.","Louisiana's legal system is based on the Napoleonic Code.","New York City was the first US capital under the Constitution.","Philadelphia was the capital before Washington D.C. was completed.","The US has been involved in over 30 military conflicts since its founding.","Puerto Rico has been a US territory since 1898 — its citizens are US citizens.","Alaska was purchased from Russia in 1867 for $7.2 million.","The US is the birthplace of baseball, basketball, American football, and volleyball.","Americans own approximately 90 million dogs and 94 million cats.","Social Security covers approximately 66 million Americans — the largest government program.","The ADA has reshaped architecture, technology, and workplace design since 1990.","The US spends more on pet care than most countries' entire government departments — over $150 billion annually.","About 67% of US households own a pet.","The Endangered Species Act (1973) has prevented extinction of 99% of species listed.","The bald eagle population rebounded from 417 nesting pairs in 1963 to over 9,700 today.","Tornadoes kill approximately 70 people per year in the US on average.","Wildfires burn approximately 7 million acres of US land annually.","FEMA has paid over $70 billion in flood claims since 1978.","National forests cover approximately 193 million acres.","US national parks drew 325 million visits in 2023.","Theodore Roosevelt established 150 national forests and 5 national parks.","The Colorado River provides water to 40 million people — it now rarely reaches the sea.","The Ogallala Aquifer under the Great Plains is being depleted faster than it recharges.","US agricultural water use accounts for approximately 80% of total national water consumption.","Student loan debt in the US exceeds all credit card debt combined.","GDP per capit aced by USMCA (2020) — maintaining North American free trade.","Wall Street's NYSE and NASDAQ are the two largest stock exchanges by market cap.","The US stock market represents approximately 60% of global equity market capitalization.","The S&P 500 has returned approximately 10% annually on average over the past century.","Americans have approximately $40 trillion in retirement savings across all accounts.","Consumer spending accounts for approximately 70% of US GDP.","US homeownership rate is approximately 65%.","Only 5% of US residential land allows multi-family housing — single-family zoning dominates.","About 40% of US adults have a bachelor's degree or higher.","Student debt affects 45 million Americans, averaging $37,000 per borrower.","US income tax was made permanent by the 16th Amendment in 1913.","The US tax code exceeds 70,000 pages — one of the most complex in the world.","The top 1% of earners pay approximately 40% of all federal income taxes.","Corporate income tax rate was cut from 35% to 21% by the Tax Cuts and Jobs Act of 2017.","US SNAP program (food stamps) serves approximately 42 million Americans.","US infrastructure receives a C- grade from the American Society of Civil Engineers.","Amtrak is chronically underfunded — but serves 31 million riders annually.","US renewable energy is approximately 22% of electricity generation.","Coal electricity generation has fallen from 50% of US power (2000) to below 17% (2024).","Natural gas now provides approximately 43% of US electricity.","Nuclear power provides approximately 18% of US electricity.","The US has more billionaires (813) than any other country.","US wealth inequality: the top 1% holds approximately 32% of all wealth.","Real US wages for median workers have barely risen since 1979 after adjusting for inflation.","US union membership rate has fallen from 35% (1954) to approximately 10% today.","The US has 330+ federal regulatory agencies.","The US Postal Service delivers to 167 million addresses — 6 days per week.","The US intelligence community has 18 separate agencies.","The F-35 program is the most expensive weapons program in history — $1.7 trillion total lifecycle cost.","US military spending as % of GDP is approximately 3.5%."]};
const CATS = ["All", ...Object.keys(DATA)];
const ALL = [];
Object.entries(DATA).forEach(([cat, arr]) => arr.forEach(f => ALL.push({c: cat, t: f})));
const POOLS = { All: ALL, ...Object.fromEntries(Object.entries(DATA).map(([c, arr]) => [c, arr.map(t => ({c, t}))])) };

const LS_KEY = "gt_facts_v1";
let state;
try { state = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ state = {}; }
state.bags = state.bags || {};
state.cat = state.cat && CATS.includes(state.cat) ? state.cat : "All";

function shuffle(n){
  const a = Array.from({length:n}, (_,i)=>i);
  for(let i=n-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function bag(cat){
  const n = POOLS[cat].length;
  let b = state.bags[cat];
  if(!b || b.order.length !== n){ b = state.bags[cat] = { order: shuffle(n), pos: 0, cycle: 1 }; }
  return b;
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }

const feed = document.getElementById("feed");
const chipsEl = document.getElementById("chips");
const progressEl = document.getElementById("progress");
const hint = document.getElementById("hint");
let hintDismissed = false;

CATS.forEach(cat => {
  const btn = document.createElement("button");
  btn.className = "chip"; btn.textContent = cat;
  btn.onclick = () => setCat(cat);
  chipsEl.appendChild(btn);
});

function renderChips(){
  [...chipsEl.children].forEach(el => el.classList.toggle("active", el.textContent === state.cat));
}

function nextFact(){
  const cat = state.cat, b = bag(cat), pool = POOLS[cat];
  if(b.pos >= b.order.length){
    b.order = shuffle(pool.length); b.pos = 0; b.cycle++;
    save();
    return { reshuffle: true, cycle: b.cycle };
  }
  const item = pool[b.order[b.pos++]];
  save();
  return { ...item, seen: b.pos, total: pool.length };
}

function makeSlide(r){
  const s = document.createElement("div");
  s.className = "slide";
  if(r.reshuffle){
    s.innerHTML = '<div class="reshuffle">You\'ve seen every fact in this category 🎉<small>Deck reshuffled — round ' + r.cycle + ' starts on the next swipe.</small></div>';
  } else {
    const tag = document.createElement("div"); tag.className = "cat-tag"; tag.textContent = r.c;
    const f = document.createElement("div"); f.className = "fact"; f.textContent = r.t;
    const m = document.createElement("div"); m.className = "meta"; m.textContent = r.seen + " / " + r.total;
    s.append(tag, f, m);
    s.dataset.seen = r.seen; s.dataset.total = r.total;
  }
  return s;
}

function appendNext(){ feed.appendChild(makeSlide(nextFact())); }

function setCat(cat){
  state.cat = cat; save(); renderChips();
  feed.innerHTML = "";
  appendNext(); appendNext();
  feed.scrollTop = 0;
  updateProgress();
}

function updateProgress(){
  const b = bag(state.cat), n = POOLS[state.cat].length;
  progressEl.textContent = Math.min(b.pos, n) + " / " + n + (b.cycle > 1 ? "  ·  round " + b.cycle : "");
}

let ticking = false;
feed.addEventListener("scroll", () => {
  if(!hintDismissed && feed.scrollTop > 40){ hint.style.display = "none"; hintDismissed = true; }
  if(ticking) return; ticking = true;
  requestAnimationFrame(() => {
    ticking = false;
    if(feed.scrollTop + feed.clientHeight * 2.5 > feed.scrollHeight) appendNext();
    updateProgress();
    if(feed.children.length > 40){
      const idx = Math.floor(feed.scrollTop / feed.clientHeight);
      if(idx > 25){
        const remove = idx - 20;
        for(let i=0;i<remove;i++) feed.removeChild(feed.firstChild);
        feed.scrollTop -= remove * feed.clientHeight;
      }
    }
  });
});

renderChips();
appendNext(); appendNext();
updateProgress();
</script>
